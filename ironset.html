function MeetSheet({ open, onClose, analysis, unit, state, setState }) {
  const meet = state.meet || { date: null, name: "", attempts: {} };
  const [share, setShare] = useState(null);
  const sex = (state.settings && state.settings.sex) || "male";
  const bwArr = state.bodyweight || [];
  const bwKg = bwArr.length ? bwArr[bwArr.length - 1].kg : null;
  const setMeet = (patch) => setState((s) => ({ ...s, meet: { ...(s.meet || { date: null, name: "", attempts: {} }), ...patch } }));
  const lifts = [analysis.big.squat, analysis.big.bench, analysis.big.deadlift].filter(Boolean);

  const attemptsFor = (lf) => {
    const ov = (meet.attempts && meet.attempts[lf.name]) || {};
    const kg = toKg(lf.e1rm, unit);
    return {
      opener: ov.opener != null ? ov.opener : round2_5(kg * 0.9),
      second: ov.second != null ? ov.second : round2_5(kg * 0.95),
      third: ov.third != null ? ov.third : round2_5(kg * 1.0),
    };
  };
  const setAttempt = (name, key, val) => setMeet({ attempts: { ...(meet.attempts || {}), [name]: { ...((meet.attempts || {})[name] || {}), [key]: val } } });
  const autoLift = (name) => setMeet({ attempts: { ...(meet.attempts || {}), [name]: {} } });

  const thirdsTotal = lifts.reduce((a, lf) => a + attemptsFor(lf).third, 0);
  const openersTotal = lifts.reduce((a, lf) => a + attemptsFor(lf).opener, 0);
  const dots = bwKg != null && lifts.length === 3 ? dotsCoeff(bwKg, sex) * thirdsTotal : null;
  const pct = { opener: "90%", second: "95%", third: "100%" };
  const lblmap = { opener: "Opener", second: "Second", third: "Third" };

  const shareMeet = () => {
    const sub = lifts.map((lf) => { const n = lf.name.toLowerCase(); const ab = n.includes("squat") ? "S" : n.includes("bench") ? "B" : "D"; return ab + " " + fmt(attemptsFor(lf).third); }).join("    ");
    doShare(setShare, { type: "stat", label: meet.name || "Projected meet total", value: fmt(thirdsTotal), unit: "kg", sub, date: meet.date ? fmtMeetDate(meet.date) : "" });
  };

  const inputStyle = { width: "100%", background: C.bg2, border: `1px solid ${C.line2}`, borderRadius: 10, padding: "0 12px", height: 44, color: C.text, fontSize: 15, fontWeight: 600, outline: "none" };

  return (
    <Sheet open={open} onClose={onClose} title="Meet prep">
      <div style={{ marginBottom: 12 }}>
        <div style={{ ...label, fontSize: 10, marginBottom: 6 }}>Meet date</div>
        <input type="date" value={meet.date || ""} onChange={(e) => setMeet({ date: e.target.value || null })}
          style={{ ...inputStyle, fontFamily: MONO, colorScheme: "dark" }} />
      </div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ ...label, fontSize: 10, marginBottom: 6 }}>Meet name (optional)</div>
        <input value={meet.name || ""} onChange={(e) => setMeet({ name: e.target.value })} placeholder="e.g. State Championship"
          style={{ ...inputStyle, fontFamily: SANS }} />
      </div>

      {lifts.length === 0 ? (
        <div style={{ fontSize: 13, color: C.muted, padding: "10px 2px", lineHeight: 1.5 }}>
          Log squat, bench, and deadlift first — your attempts build off their estimated maxes.
        </div>
      ) : (
        <>
          <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: "14px 16px", position: "relative", marginBottom: 12, textAlign: "center" }}>
            <button onClick={shareMeet} aria-label="Share" style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4, position: "absolute", top: 8, right: 8 }}><Share size={16} /></button>
            <div style={{ ...label, fontSize: 10 }}>If you hit your thirds</div>
            <div style={{ fontFamily: MONO, fontSize: 38, fontWeight: 700, lineHeight: 1, marginTop: 6 }}>{fmt(thirdsTotal)}<span style={{ fontSize: 15, color: C.muted, marginLeft: 4 }}>kg</span></div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>
              Openers in the bag <b style={{ color: C.text, fontFamily: MONO }}>{fmt(openersTotal)}</b> kg{dots != null && <> · DOTS <b style={{ color: C.text, fontFamily: MONO }}>{fmt(Math.round(dots))}</b></>}
            </div>
          </div>

          {lifts.map((lf) => {
            const at = attemptsFor(lf);
            return (
              <Card key={lf.name} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
                  <b style={{ fontSize: 15 }}>{lf.name}</b>
                  <span style={{ fontSize: 11.5, color: C.muted }}>e1RM {fmt(lf.e1rm)} {unit} · <button onClick={() => autoLift(lf.name)} style={{ background: "none", border: "none", color: C.red, fontWeight: 700, fontSize: 11.5, cursor: "pointer", padding: 0 }}>Auto</button></span>
                </div>
                {["opener", "second", "third"].map((k) => (
                  <div key={k} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 13 }}>{lblmap[k]}</div>
                      <div style={{ fontSize: 11, color: C.faint }}>{pct[k]} · {fmt(Math.round(at[k] * LBKG))} lb</div>
                    </div>
                    <Stepper value={at[k]} step={2.5} min={0} suffix="kg" onChange={(v) => setAttempt(lf.name, k, v)} />
                  </div>
                ))}
              </Card>
            );
          })}
          {meet.date && <Btn kind="danger" onClick={() => setMeet({ date: null, attempts: {} })} style={{ width: "100%", marginTop: 4 }}>Clear meet</Btn>}
        </>
      )}
      {share && <ShareSheet data={share} onClose={() => setShare(null)} />}
    </Sheet>
  );
}

/* ============================== INSIGHTS ================================ */
function InsightsTab({ analysis, unit, state, setState }) {
  const { total, totalDelta, parts, insights } = analysis;
  const sevColor = { alert: C.red, watch: "#D9A441", win: C.good, note: "#7FA8C9" };
  const [share, setShare] = useState(null);
  const iconBtn = { background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4, flexShrink: 0, display: "flex", alignItems: "center" };
  const dateStr = new Date().toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  const shareStat = () => {
    const sub = parts.slice(0, 3).map((p) => {
      const n = p.name.toLowerCase();
      const ab = n.includes("squat") ? "S" : n.includes("bench") ? "B" : n.includes("dead") ? "D" : p.name.slice(0, 2).toUpperCase();
      return ab + " " + fmt(Math.round(p.e1rm));
    }).join("    ");
    doShare(setShare, { type: "stat", label: "Projected total", value: fmt(Math.round(total)), unit, delta: totalDelta != null ? Math.round(totalDelta) : null, sub, date: dateStr });
  };
  const shareInsight = (it) => doShare(setShare, { type: "insight", title: it.title, detail: it.detail, accent: sevColor[it.sev], date: dateStr });
  if ((!insights || insights.length === 0) && (!parts || parts.length === 0))
    return (
      <Card style={{ textAlign: "center", color: C.muted, fontSize: 13.5, padding: "28px 18px", lineHeight: 1.6 }}>
        Log a few sets and I'll start reading your training here — strength trends, hidden gains from your variations, RPE calibration, weak points. No two lifters get the same reads.
      </Card>
    );
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {total != null ? (
        <Card style={{ textAlign: "center", paddingTop: 20, paddingBottom: 18, position: "relative" }}>
          <button onClick={shareStat} aria-label="Share" style={{ ...iconBtn, position: "absolute", top: 10, right: 10 }}><Share size={16} /></button>
          <div style={label}>Projected total</div>
          <div style={{ fontFamily: MONO, fontSize: 46, fontWeight: 700, lineHeight: 1, marginTop: 6, fontVariantNumeric: "tabular-nums" }}>
            {fmt(Math.round(total))}<span style={{ fontSize: 16, color: C.muted, marginLeft: 5 }}>{unit}</span>
          </div>
          {totalDelta != null && Math.abs(totalDelta) >= 1 && (
            <div style={{ fontSize: 12.5, fontWeight: 700, marginTop: 6, color: totalDelta > 0 ? C.good : C.red }}>
              {totalDelta > 0 ? "+" : ""}{fmt(Math.round(totalDelta))} {unit} in 30 days
            </div>
          )}
          <div style={{ display: "flex", justifyContent: "center", gap: 22, marginTop: 14 }}>
            {parts.slice(0, 3).map((p) => (
              <div key={p.name} style={{ textAlign: "center" }}>
                <div style={{ ...label, fontSize: 9 }}>{p.name}</div>
                <div style={{ fontFamily: MONO, fontSize: 18, fontWeight: 700, marginTop: 2 }}>{fmt(Math.round(p.e1rm))}</div>
              </div>
            ))}
          </div>
        </Card>
      ) : parts && parts.length > 0 ? (
        <Card>
          <div style={{ ...label, marginBottom: 4 }}>Estimated 1RMs</div>
          {parts.map((p) => (
            <div key={p.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 8 }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{p.name}</span>
              <span style={{ fontFamily: MONO, fontWeight: 700 }}>{fmt(Math.round(p.e1rm))} <span style={{ color: C.muted, fontSize: 12 }}>{unit}</span></span>
            </div>
          ))}
        </Card>
      ) : null}

      <ScoreCard analysis={analysis} unit={unit} state={state} setState={setState} />
      <MeetCard analysis={analysis} unit={unit} state={state} setState={setState} />

      {insights.map((it) => (
        <div key={it.id} style={{ background: C.surface, border: `1px solid ${C.line}`, borderLeft: `3px solid ${sevColor[it.sev]}`, borderRadius: 12, padding: "13px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
              <span style={{ width: 7, height: 7, borderRadius: 99, background: sevColor[it.sev], flexShrink: 0 }} />
              <span style={{ fontWeight: 800, fontSize: 13.5 }}>{it.title}</span>
            </div>
            <button onClick={() => shareInsight(it)} aria-label="Share" style={iconBtn}><Share size={15} /></button>
          </div>
          <div style={{ fontSize: 12.5, color: C.muted, marginTop: 5, lineHeight: 1.5 }}>{it.detail}</div>
        </div>
      ))}

      <div style={{ fontSize: 11, color: C.faint, textAlign: "center", marginTop: 2, lineHeight: 1.5 }}>
        These read your own logged data and refresh every time you train.
      </div>
      {share && <ShareSheet data={share} onClose={() => setShare(null)} />}
    </div>
  );
}

function ShareSheet({ data, onClose }) {
  if (!data) return null;
  const canShare = typeof navigator !== "undefined" && navigator.share && navigator.canShare && navigator.canShare({ files: [data.file] });
  const save = () => { const a = document.createElement("a"); a.href = data.url; a.download = data.file.name; document.body.appendChild(a); a.click(); a.remove(); };
  const reshare = async () => { try { await navigator.share({ files: [data.file] }); } catch (e) {} };
  return (
    <Sheet open onClose={onClose} title="Share">
      <img src={data.url} alt="IRONSET card" style={{ width: "100%", borderRadius: 14, display: "block", border: `1px solid ${C.line}` }} />
      <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
        {canShare && <Btn kind="primary" onClick={reshare} style={{ flex: 1 }}>Share</Btn>}
        <Btn kind="solid" onClick={save} style={{ flex: 1 }}>Save image</Btn>
      </div>
      <div style={{ fontSize: 11.5, color: C.faint, marginTop: 10, textAlign: "center", lineHeight: 1.5 }}>
        On iPhone you can also press and hold the image to save it or send it straight to Instagram or Messages.
      </div>
    </Sheet>
  );
}

/* ============================== LINK SHEET ============================== */
function LinkSheet({ name, exercise, mains, childNames, effectiveRatio, onClose, onSave }) {
  const isMainWithKids = childNames.length > 0;
  const [parent, setParent] = useState(exercise.parent || "");
  const [mode, setMode] = useState(typeof exercise.ratioManual === "number" ? "custom" : "auto");
  const [pct, setPct] = useState(String(Math.round((exercise.ratioManual ?? exercise.ratio ?? effectiveRatio ?? 0.9) * 100)));
  const fld = { fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 };
  const options = mains.filter((m) => m !== name);
  const save = () => {
    if (!parent) { onSave({ parent: undefined, ratio: undefined, ratioManual: undefined }); return; }
    const patch = { parent };
    if (mode === "custom") patch.ratioManual = Math.min(1.5, Math.max(0.3, (parseFloat(pct) || 90) / 100));
    else { patch.ratioManual = undefined; if (typeof exercise.ratio !== "number") patch.ratio = defaultRatio(name); }
    onSave(patch);
  };
  return (
    <Sheet open onClose={onClose} title="Link to a main lift">
      {isMainWithKids ? (
        <div style={{ fontSize: 13, color: C.muted, lineHeight: 1.6 }}>
          <b style={{ color: C.text }}>{name}</b> is a main lift and already pools: {childNames.join(", ")}. Relink those variations elsewhere first if you want to make this one a variation.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div>
            <div style={fld}>Variation of</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <Chip active={parent === ""} onClick={() => setParent("")}>None — main lift</Chip>
              {options.map((m) => <Chip key={m} active={parent === m} onClick={() => setParent(m)}>{m}</Chip>)}
            </div>
          </div>
          {parent && (
            <div>
              <div style={fld}>Strength ratio to {parent}</div>
              <Segmented value={mode} onChange={setMode} options={[{ value: "auto", label: "AUTO" }, { value: "custom", label: "CUSTOM" }]} />
              {mode === "custom" ? (
                <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 120 }}><NumField value={pct} onChange={setPct} suffix="%" /></div>
                  <div style={{ fontSize: 12, color: C.faint }}>of your {parent}</div>
                </div>
              ) : (
                <div style={{ fontSize: 11.5, color: C.faint, marginTop: 8 }}>
                  Currently ≈{Math.round((effectiveRatio || 0.9) * 100)}%. Auto-learns the real ratio once both lifts have a few logged sets.
                </div>
              )}
            </div>
          )}
          <Btn kind="primary" onClick={save} style={{ width: "100%" }}>Save</Btn>
        </div>
      )}
    </Sheet>
  );
}

/* ============================== EDIT SET ================================= */
function EditSetSheet({ set, unit, inputMode, onClose, onSave, onDelete }) {
  const [date, setDate] = useState(dateStrFromTs(set.ts));
  const [weight, setWeight] = useState(String(set.weight));
  const [reps, setReps] = useState(set.reps);
  const [int, setInt] = useState(inputMode === "rir" ? 10 - set.rpe : set.rpe);
  const [note, setNote] = useState(set.note || "");
  const fld = { fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 };
  const save = () => {
    const w = parseFloat(weight);
    if (isNaN(w) || w <= 0) return;
    const rpe = inputMode === "rir" ? 10 - int : int;
    let ts = set.ts; // keep original time-of-day unless the day actually changed
    if (date !== dateStrFromTs(set.ts)) { const [y, m, d] = date.split("-").map(Number); ts = new Date(y, m - 1, d, 12, 0, 0).getTime(); }
    onSave({ ts, weight: w, reps, rpe, note: note.trim() || undefined });
  };
  return (
    <Sheet open onClose={onClose} title="Edit set">
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div>
          <div style={fld}>Date</div>
          <DateField value={date} onChange={setDate} />
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 110px" }}>
            <div style={fld}>Weight</div>
            <NumField value={weight} onChange={setWeight} suffix={unit} />
          </div>
          <div>
            <div style={fld}>Reps</div>
            <Stepper value={reps} onChange={setReps} min={1} max={30} />
          </div>
          <div>
            <div style={fld}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
            <Stepper value={int} onChange={setInt} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 6 : 10} />
          </div>
        </div>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (optional)"
          style={{ width: "100%", background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "11px 12px",
            color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
        <div style={{ fontSize: 11.5, color: C.faint }}>
          New estimate from this set: {fmt(e1rmFromSet(parseFloat(weight) || 0, reps, inputMode === "rir" ? 10 - int : int))} {unit} e1RM
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="primary" onClick={save} style={{ flex: 1 }} disabled={!parseFloat(weight)}>Save changes</Btn>
          <Btn kind="danger" onClick={onDelete}><Trash2 size={15} /></Btn>
        </div>
      </div>
    </Sheet>
  );
}

/* ============================== SETTINGS ================================= */
function SettingsSheet({ open, onClose, settings, setSetting, state, setState }) {
  const [backup, setBackup] = useState("");
  const [importText, setImportText] = useState("");
  const [err, setErr] = useState("");
  const [armReset, setArmReset] = useState(false);
  const [saveStatus, setSaveStatus] = useState(null);
  const testStorage = () => {
    try {
      const tk = "ironset-selftest", v = String(Date.now());
      localStorage.setItem(tk, v);
      const ok = localStorage.getItem(tk) === v;
      localStorage.removeItem(tk);
      setSaveStatus(ok ? { ok: true, msg: "Saving works on this device. ✓" } : { ok: false, msg: "Couldn't read data back — Private Browsing may be blocking storage." });
    } catch (e) { setSaveStatus({ ok: false, msg: "Storage blocked: " + ((e && e.message) || String(e)) + " — turn off Private Browsing." }); }
  };
  const exportData = () => setBackup(JSON.stringify(state));
  const importData = () => {
    setErr("");
    try {
      const p = JSON.parse(importText);
      setState({ ...DEFAULT, ...p, settings: { ...DEFAULT.settings, ...(p.settings || {}) } });
      onClose();
    } catch (e) { setErr("That doesn't look like valid backup data."); }
  };
  const row = { marginBottom: 18 };
  return (
    <Sheet open={open} onClose={onClose} title="Settings">
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Training style</div>
        <Segmented value={settings.trainingMode || "rpe"} onChange={(v) => {
            if (v === "percent") { setSetting("trainingMode", "percent"); setSetting("inputMode", "rir"); }
            else { setSetting("trainingMode", "rpe"); setSetting("inputMode", "rpe"); }
          }}
          options={[{ value: "rpe", label: "RPE" }, { value: "percent", label: "%" }]} />
        <div style={{ fontSize: 11.5, color: C.faint, marginTop: 6 }}>
          {settings.trainingMode === "percent" ? "Prescribe by reps and a % of your max." : "Prescribe by reps and RPE — the app suggests the load."}
        </div>
      </div>
      {settings.trainingMode === "percent" && (
        <div style={row}>
          <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Percentages run off</div>
          <Segmented value={settings.maxMode || "dynamic"} onChange={(v) => setSetting("maxMode", v)}
            options={[{ value: "dynamic", label: "Estimated max" }, { value: "locked", label: "Max I set" }]} />
          <div style={{ fontSize: 11.5, color: C.faint, marginTop: 6 }}>
            {settings.maxMode === "locked" ? "A training max you set per lift and bump yourself each cycle." : "Your live estimated max — auto-updates as you log."}
          </div>
        </div>
      )}
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Units</div>
        <Segmented value={settings.unit} onChange={(v) => {
            if (v === settings.unit) return;
            const f = v === "kg" ? 1 / LBKG : LBKG;
            const cv = (w) => (typeof w === "number" ? Math.round(w * f * 10) / 10 : w);
            setState((s) => {
              const exercises = {};
              for (const [k, e] of Object.entries(s.exercises))
                exercises[k] = { ...e, sets: e.sets.map((st) => ({ ...st, weight: cv(st.weight), rec: st.rec != null ? cv(st.rec) : st.rec })), tmax: e.tmax != null ? cv(e.tmax) : e.tmax };
              return { ...s, exercises, settings: { ...s.settings, unit: v, bar: roundTo((s.settings.bar || 0) * f, v === "kg" ? 2.5 : 5), round: v === "kg" ? 2.5 : 5, unitSchema: 2 } };
            });
          }}
          options={[{ value: "lb", label: "LB" }, { value: "kg", label: "KG" }]} />
      </div>
      {settings.trainingMode !== "percent" && (
        <div style={row}>
          <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Prescribe intensity as</div>
          <Segmented value={settings.inputMode} onChange={(v) => setSetting("inputMode", v)}
            options={[{ value: "rpe", label: "RPE" }, { value: "rir", label: "RIR" }]} />
          <div style={{ fontSize: 11.5, color: C.faint, marginTop: 6 }}>RPE 8 and 2 RIR mean the same thing — pick the scale you think in.</div>
        </div>
      )}
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Round loads to nearest</div>
        <Segmented value={settings.round} onChange={(v) => setSetting("round", v)}
          options={[{ value: 1, label: "1" }, { value: 2.5, label: "2.5" }, { value: 5, label: "5" }]} />
      </div>
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Bar weight (for plate math)</div>
        <NumField value={settings.bar} onChange={(v) => setSetting("bar", parseFloat(v) || 0)} suffix={settings.unit} />
      </div>

      <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 4 }}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Saving</div>
        <Btn kind="solid" onClick={testStorage} style={{ width: "100%" }}>Test saving on this device</Btn>
        {saveStatus && <div style={{ fontSize: 12.5, marginTop: 8, fontWeight: 600, color: saveStatus.ok ? C.good : C.red }}>{saveStatus.msg}</div>}
        <div style={{ fontSize: 11.5, color: C.faint, marginTop: 6 }}>
          If saving isn't available here, your logs won't survive a close — use the hosted web version, which saves on your phone.
        </div>
      </div>

      <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 16 }}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Backup</div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="solid" onClick={exportData} style={{ flex: 1 }}>Show backup</Btn>
          <Btn kind="solid" onClick={importData} style={{ flex: 1 }} disabled={!importText.trim()}>Restore</Btn>
        </div>
        {backup && <textarea readOnly value={backup} onFocus={(e) => e.target.select()} rows={3}
          style={{ width: "100%", marginTop: 8, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8,
            color: C.muted, fontSize: 11, fontFamily: MONO, padding: 8, resize: "vertical" }} />}
        <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="Paste backup data here to restore" rows={2}
          style={{ width: "100%", marginTop: 8, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8,
            color: C.text, fontSize: 11, fontFamily: MONO, padding: 8, resize: "vertical", outline: "none" }} />
        {err && <div style={{ color: C.red, fontSize: 12, marginTop: 6 }}>{err}</div>}
      </div>

      <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 16 }}>
        {armReset ? (
          <div style={{ display: "flex", gap: 8 }}>
            <Btn kind="danger" onClick={() => { setState(DEFAULT); setArmReset(false); onClose(); }} style={{ flex: 1 }}>Yes, erase everything</Btn>
            <Btn kind="ghost" onClick={() => setArmReset(false)} style={{ flex: 1 }}>Cancel</Btn>
          </div>
        ) : (
          <Btn kind="danger" onClick={() => setArmReset(true)} style={{ width: "100%" }}>Reset all data</Btn>
        )}
      </div>
    </Sheet>
  );
}


class Boundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(e, info) { console.error(e, info); }
  render() {
    if (this.state.err) return (
      <div style={{ padding: 20, minHeight: "100vh", background: "#14161A", color: "#ECEAE3", fontFamily: "system-ui, sans-serif" }}>
        <div style={{ fontWeight: 800, marginBottom: 8 }}>IRONSET hit an error</div>
        <div style={{ fontSize: 12, color: "#9098A4", marginBottom: 10 }}>Reload the page. Your saved data on this device is untouched.</div>
        <pre style={{ whiteSpace: "pre-wrap", fontSize: 11, color: "#E23B2E" }}>{String((this.state.err && this.state.err.message) || this.state.err)}</pre>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App /></Boundary>);

</script>
