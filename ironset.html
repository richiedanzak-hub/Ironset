/* ----------------------------------------------------------------------------
   STRENGTH ENGINE
   Everything keys off one idea: an RPE-anchored set tells you how far from
   failure you were. RIR = 10 - RPE, so a set of `reps` at a given RPE is
   equivalent to doing `reps + RIR` reps to true failure. That single "reps to
   failure" number maps to a % of 1RM via the standard RPE/RTS chart. From there
   we can both estimate a 1RM from any set, and predict a weight for any target.
---------------------------------------------------------------------------- */

// % of 1RM for N reps taken to true failure (RPE 10). Standard RTS values.
const PCT = {
  1: 100.0, 2: 95.5, 3: 92.2, 4: 89.2, 5: 86.3, 6: 83.7, 7: 81.1, 8: 78.6,
  9: 76.2, 10: 73.9, 11: 70.7, 12: 68.0, 13: 65.3, 14: 62.6, 15: 59.9,
  16: 57.3, 17: 54.8, 18: 52.4, 19: 50.0, 20: 47.6,
};
function pctForN(n) {
  if (n <= 1) return 100;
  if (n >= 20) return PCT[20];
  const lo = Math.floor(n), hi = Math.ceil(n);
  if (lo === hi) return PCT[lo];
  return PCT[lo] + (PCT[hi] - PCT[lo]) * (n - lo); // linear interp for half-RPEs
}
const repsToFailure = (reps, rpe) => reps + Math.max(0, 10 - rpe);
// Observed estimated 1RM from a completed set.
function e1rmFromSet(weight, reps, rpe) {
  return weight / (pctForN(repsToFailure(reps, rpe)) / 100);
}
// Predict the weight for a prescribed (reps, rpe) given an estimated 1RM.
function weightForTarget(e1rm, reps, rpe) {
  return e1rm * (pctForN(repsToFailure(reps, rpe)) / 100);
}
// How much a set should move the estimate. Heavy/low-rep sets near a max are
// reliable 1RM predictors; long high-rep sets are noisier, so they count less.
function reliability(n) {
  return n <= 8 ? 1 : Math.max(0.4, 1 - (n - 8) * 0.06);
}
// Fatigue model. A set spends capacity in proportion to volume (reps) and how close
// to failure it was — effort grows steeply toward RPE 10, so a grind costs far more
// than an easy set. The per-lifter sensitivity K is learned from their own history.
const DEFAULT_FATIGUE_K = 0.027;
function fatigueEffort(rpe) {
  const p = Math.max(0, (Math.min(10, rpe) - 4) / 6); // RPE6→.11, 8→.44, 9.5→.84, 10→1
  return p * p;
}
function fatigueDrop(reps, rpe, k) {
  return Math.max(0, Math.min(0.32, k * Math.max(1, reps) * fatigueEffort(rpe)));
}
// Learn how fast THIS lifter's capacity falls across a session, from descending
// (back-off) steps: each step's implied-1RM drop ÷ the prior set's fatigue stimulus.
// Median is robust to noise; the result is shrunk toward the default so sparse data
// stays sane and it only drifts to a personal value once there's real evidence.
function learnFatigueK(sets, dflt) {
  const byDay = {};
  for (const s of sets) { const d = new Date(s.ts).toDateString(); (byDay[d] = byDay[d] || []).push(s); }
  const ks = [];
  for (const d in byDay) {
    const day = byDay[d].slice().sort((a, b) => a.ts - b.ts);
    for (let i = 0; i < day.length - 1; i++) {
      const a = day[i], b = day[i + 1];
      if (a.reps !== b.reps || b.weight > a.weight) continue; // equal reps → drop is pure fatigue
      const ea = e1rmFromSet(a.weight, a.reps, a.rpe), eb = e1rmFromSet(b.weight, b.reps, b.rpe);
      if (!(ea > 0)) continue;
      const drop = 1 - eb / ea;
      if (drop <= 0.0008 || drop > 0.35) continue;
      const stim = Math.max(1, a.reps) * fatigueEffort(a.rpe);
      if (stim <= 0.02) continue;
      const k = drop / stim;
      if (k >= 0.0015 && k <= 0.09) ks.push(k);
    }
  }
  if (ks.length < 2) return dflt; // wait for a little evidence before personalizing
  ks.sort((x, y) => x - y);
  const med = ks[Math.floor(ks.length / 2)], n = ks.length, W0 = 6;
  const blended = (n * med + W0 * dflt) / (n + W0);
  return Math.max(0.4 * dflt, Math.min(2 * dflt, blended));
}
// Inverse of pctForN: max reps achievable at a given %1RM (lets % training show a
// predicted RPE/RIR, so the two styles speak the same language).
function repsAtPct(pct) {
  if (pct >= 100) return 1;
  let prev = 1, prevP = pctForN(1);
  for (let n = 2; n <= 24; n++) {
    const p = pctForN(n);
    if (p <= pct) return prev + (prevP - pct) / (prevP - p || 1);
    prev = n; prevP = p;
  }
  return 24;
}
// Fold the whole (time-ordered) history into a learned 1RM + a trajectory.
function buildModel(sets) {
  const sorted = [...sets].sort((a, b) => a.ts - b.ts);
  let e = null;
  const points = [];
  for (const s of sorted) {
    const obs = e1rmFromSet(s.weight, s.reps, s.rpe);
    const n = repsToFailure(s.reps, s.rpe);
    e = e == null ? obs : e + 0.35 * reliability(n) * (obs - e);
    points.push({ ts: s.ts, value: e, obs });
  }
  const out = { e1rm: e, points, count: sorted.length };
  return out;
}

/* ----------------------------------------------------------------------------
   INSIGHT ENGINE — reads the data the app already has and turns it into plain
   reads. Pure local rules: strength trend, hidden gains from variations, RPE
   calibration, weak points. No AI/backend.
---------------------------------------------------------------------------- */
function analyze(state, models, unit) {
  const ex = state.exercises;
  const U = unit || "lb";
  const names = Object.keys(ex);
  const mains = names.filter((n) => !ex[n].parent);
  const now = Date.now(), DAY = 864e5;
  const r1 = (x) => fmt(Math.round(x));
  const valueAt = (pts, t) => { let v = null; for (const p of pts) { if (p.ts <= t) v = p.value; else break; } return v; };
  const out = [];
  const add = (sev, title, detail, scope) => out.push({ id: (scope || "g") + "|" + title, sev, title, detail });

  // projected total + per-lift estimates
  const find = (kw) => mains.find((n) => n.toLowerCase() === kw) || mains.find((n) => n.toLowerCase().includes(kw));
  const S = find("squat"), B = find("bench"), D = find("deadlift");
  const parts = mains.filter((n) => models[n] && models[n].e1rm != null).map((n) => {
    const m = models[n]; const ago = valueAt(m.points, now - 30 * DAY);
    return { name: n, e1rm: m.e1rm, delta: ago != null ? m.e1rm - ago : null };
  });
  let total = null, totalDelta = null;
  if (S && B && D && models[S].e1rm != null && models[B].e1rm != null && models[D].e1rm != null) {
    total = models[S].e1rm + models[B].e1rm + models[D].e1rm;
    totalDelta = [S, B, D].reduce((acc, n) => { const a = valueAt(models[n].points, now - 30 * DAY); return acc + (a != null ? models[n].e1rm - a : 0); }, 0);
  }

  for (const M of mains) {
    const m = models[M]; if (!m || m.e1rm == null) continue;
    const pts = m.points, latest = m.e1rm, lastTs = pts.length ? pts[pts.length - 1].ts : null;
    const priorMax = pts.length > 1 ? Math.max(...pts.slice(0, -1).map((p) => p.value)) : -Infinity;
    let prFired = false;
    if (pts.length >= 4 && latest > priorMax + 0.5 && lastTs && now - lastTs < 21 * DAY) {
      add("win", "New " + M + " high", "Your estimated " + M + " 1RM just hit a new high of " + r1(latest) + " " + U + ".", M); prFired = true;
    }
    const ago30 = valueAt(pts, now - 30 * DAY);
    if (ago30 != null && ago30 > 0) {
      const d = latest - ago30, pct = (d / ago30) * 100, thr = Math.max(2, ago30 * 0.015);
      if (!prFired && d > thr) add("win", M + " trending up", "Up " + r1(d) + " " + U + " (" + pct.toFixed(1) + "%) over the last 30 days.", M);
      else if (d < -thr) add("watch", M + " slipping", "Down " + r1(-d) + " " + U + " over 30 days — could be fatigue or a rough stretch.", M);
    }
    const kids = names.filter((n) => ex[n].parent === M);
    if (kids.length) {
      const ownM = m.own && m.own.e1rm;
      const recentKids = kids.filter((k) => ex[k].sets.some((s) => now - s.ts < 21 * DAY));
      const kidLabel = (recentKids.length ? recentKids : kids).join(" & ");
      if (ownM == null) add("win", M + " from variations", "You haven't done straight " + M + " lately — based on your " + kidLabel + ", your " + M + " 1RM is about " + r1(latest) + " " + U + ".", M);
      else if (latest > ownM * 1.02) add("win", "Hidden " + M + " strength", "Your " + kidLabel + " suggests your " + M + " 1RM is ~" + r1(latest - ownM) + " " + U + " higher than your recent straight " + M + " shows (" + r1(latest) + " vs " + r1(ownM) + ").", M);
    }
    if (lastTs && now - lastTs > 14 * DAY && pts.length >= 4) add("note", M + " has gone quiet", Math.round((now - lastTs) / DAY) + " days since your last " + M + " work.", M);
  }

  for (const V of names) {
    const x = ex[V]; if (!x.parent || !ex[x.parent] || typeof x.ratioManual === "number") continue;
    const mv = models[V], own = mv && mv.own && mv.own.e1rm, ownP = models[x.parent] && models[x.parent].own && models[x.parent].own.e1rm;
    if (!own || !ownP) continue;
    const r = mv.ratio, base = typeof x.ratio === "number" ? x.ratio : defaultRatio(V), lc = V.toLowerCase();
    const zone = /block|board|pin|lockout|rack/.test(lc) ? "lockout strength" : /pause|deficit|bottom|dead\s*stop|tempo/.test(lc) ? "bottom-end strength" : "that range";
    if (r > base + 0.03) add("win", V + " catching up", "Your " + V + " is now " + Math.round(r * 100) + "% of " + x.parent + " (was ~" + Math.round(base * 100) + "%) — " + zone + " is improving.", V);
    else if (r < base - 0.04) add("watch", V + " lagging", "Your " + V + " has dropped to " + Math.round(r * 100) + "% of " + x.parent + " — " + zone + " may be a weak point.", V);
  }

  const recSets = [];
  for (const n of names) for (const s of ex[n].sets) if (s.fromRec && typeof s.tRpe === "number" && now - s.ts < 49 * DAY) recSets.push(s);
  if (recSets.length >= 4) {
    const errs = recSets.map((s) => s.rpe - s.tRpe);
    const bias = errs.reduce((a, b) => a + b, 0) / errs.length;
    const mae = errs.reduce((a, b) => a + Math.abs(b), 0) / errs.length;
    if (mae <= 0.6 && recSets.length >= 6) add("note", "Your RPE is dialed in", "Across your last " + recSets.length + " prescribed sets you're within ±" + mae.toFixed(1) + " RPE of target — trust your top sets.", "rpe");
    else if (bias >= 0.5) add("note", "Sets landing harder than asked", "On average ~" + bias.toFixed(1) + " RPE above target — the model is nudging your loads down to match.", "rpe");
    else if (bias <= -0.5) add("note", "More in the tank than you think", "Sets land ~" + Math.abs(bias).toFixed(1) + " RPE easier than asked — the model is nudging loads up.", "rpe");
    else if (mae >= 1.2) add("note", "RPE calls are swingy", "Your effort ratings vary ±" + mae.toFixed(1) + " RPE — an occasional set to true failure will recalibrate your gauge.", "rpe");
  }

  if (S && B && D && models[S].e1rm && models[B].e1rm && models[D].e1rm) {
    const sq = models[S].e1rm, be = models[B].e1rm;
    if (be / sq < 0.58) add("watch", "Bench is your lagging lift", "Your bench is " + Math.round((be / sq) * 100) + "% of your squat (typical is ~65–75%) — likely the biggest lever on your total.", "bal");
  }

  const rank = { alert: 0, win: 1, watch: 2, note: 3 };
  out.sort((a, b) => rank[a.sev] - rank[b.sev]);
  const big = {
    squat: S ? { name: S, e1rm: models[S].e1rm } : null,
    bench: B ? { name: B, e1rm: models[B].e1rm } : null,
    deadlift: D ? { name: D, e1rm: models[D].e1rm } : null,
  };
  return { total, totalDelta, parts, insights: out.slice(0, 8), big };
}

/* ----------------------------------------------------------------------------
   SHARE CARDS — draw a clean, branded IRONSET image on a canvas (no deps,
   offline) and hand it to the iOS share sheet, with a save/preview fallback.
---------------------------------------------------------------------------- */
function _round(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function _barbell(ctx, cx, cy, width) {
  const half = width / 2;
  ctx.fillStyle = "#E23B2E";
  ctx.fillRect(cx - half, cy - 14, 11, 28);
  ctx.fillRect(cx + half - 11, cy - 14, 11, 28);
  ctx.fillStyle = "rgba(226,59,46,0.45)";
  ctx.fillRect(cx - half + 13, cy - 2, width - 26, 5);
}
function _wrap(ctx, text, x, y, maxW, lh) {
  const words = String(text).split(/\s+/);
  let line = "", yy = y;
  for (const w of words) {
    const t = line ? line + " " + w : w;
    if (ctx.measureText(t).width > maxW && line) { ctx.fillText(line, x, yy); line = w; yy += lh; }
    else line = t;
  }
  if (line) { ctx.fillText(line, x, yy); yy += lh; }
  return yy;
}
function buildCard(p) {
  const W = 1080, H = 1350;
  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const SANS = "'Helvetica Neue', Helvetica, Arial, sans-serif";
  const MON = "'Menlo','Monaco',monospace";
  ctx.fillStyle = "#14161A"; ctx.fillRect(0, 0, W, H);
  const g = ctx.createRadialGradient(W - 150, 220, 0, W - 150, 220, 560);
  g.addColorStop(0, "rgba(226,59,46,0.12)"); g.addColorStop(1, "rgba(226,59,46,0)");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = "#2C313B"; ctx.lineWidth = 2;
  _round(ctx, 40, 40, W - 80, H - 80, 30); ctx.stroke();

  ctx.textBaseline = "alphabetic"; ctx.textAlign = "left";
  ctx.font = "800 48px " + SANS;
  ctx.fillStyle = "#ECEAE3"; ctx.fillText("IRON", 90, 158);
  const iw = ctx.measureText("IRON").width;
  ctx.fillStyle = "#E23B2E"; ctx.fillText("SET", 90 + iw, 158);

  if (p.type === "stat") {
    ctx.textAlign = "center";
    ctx.fillStyle = "#929AA6"; ctx.font = "800 34px " + SANS;
    try { ctx.letterSpacing = "6px"; } catch (e) {}
    ctx.fillText(String(p.label).toUpperCase(), W / 2, 575);
    try { ctx.letterSpacing = "0px"; } catch (e) {}
    ctx.textAlign = "left";
    ctx.font = "700 230px " + MON; const vw = ctx.measureText(String(p.value)).width;
    ctx.font = "700 64px " + MON; const uw = p.unit ? ctx.measureText(p.unit).width : 0;
    const gap = p.unit ? 20 : 0, sx = (W - (vw + gap + uw)) / 2, by = 790;
    ctx.fillStyle = "#ECEAE3"; ctx.font = "700 230px " + MON; ctx.fillText(String(p.value), sx, by);
    if (p.unit) { ctx.fillStyle = "#929AA6"; ctx.font = "700 64px " + MON; ctx.fillText(p.unit, sx + vw + gap, by); }
    ctx.textAlign = "center";
    if (p.delta != null && Math.abs(p.delta) >= 1) {
      ctx.fillStyle = p.delta > 0 ? "#7FC68F" : "#E23B2E"; ctx.font = "700 42px " + SANS;
      ctx.fillText((p.delta > 0 ? "+" : "") + p.delta + " " + (p.unit || "") + "   /   30 days", W / 2, 880);
    }
    _barbell(ctx, W / 2, 975, 380);
    if (p.sub) { ctx.fillStyle = "#5C6470"; ctx.font = "700 36px " + MON; ctx.fillText(p.sub, W / 2, 1072); }
  } else {
    const accent = p.accent || "#E23B2E", mx = 100, top = 560, maxW = W - mx * 2 - 36;
    ctx.textAlign = "left";
    ctx.fillStyle = "#ECEAE3"; ctx.font = "800 64px " + SANS;
    const y1 = _wrap(ctx, p.title, mx + 36, top, maxW, 78);
    ctx.fillStyle = "#9098A4"; ctx.font = "400 42px " + SANS;
    const y2 = _wrap(ctx, p.detail, mx + 36, y1 + 36, maxW, 58);
    ctx.fillStyle = accent; _round(ctx, mx, top - 52, 9, (y2 - 24) - (top - 52), 4); ctx.fill();
    _barbell(ctx, W / 2, H - 250, 300);
  }

  ctx.font = "600 30px " + SANS; ctx.fillStyle = "#5C6470";
  ctx.textAlign = "left"; ctx.fillText(p.date || "", 90, H - 92);
  ctx.textAlign = "right"; ctx.fillText("ironset", W - 90, H - 92);
  ctx.textAlign = "left";
  return cv;
}
async function shareCard(cv, filename, onPreview) {
  const blob = await new Promise((res) => cv.toBlob(res, "image/png"));
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const file = new File([blob], filename, { type: "image/png" });
  if (typeof navigator !== "undefined" && navigator.canShare && navigator.share && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); URL.revokeObjectURL(url); return; }
    catch (e) { if (e && e.name === "AbortError") { URL.revokeObjectURL(url); return; } }
  }
  onPreview({ url, file });
}
function doShare(onPreview, payload) { try { shareCard(buildCard(payload), "ironset-" + Date.now() + ".png", onPreview); } catch (e) {} }

/* ----------------------------------------------------------------------------
   STRENGTH SCORE + MEET MATH — kg conversion, DOTS & Wilks coefficients, plate
   rounding, attempt defaults. Powerlifting runs in kilos on 2.5 kg jumps.
---------------------------------------------------------------------------- */
const LBKG = 2.2046226218;
const toKg = (v, unit) => (unit === "kg" ? v : v / LBKG);
const fromKg = (kg, unit) => (unit === "kg" ? kg : kg * LBKG);
const round2_5 = (kg) => Math.round(kg / 2.5) * 2.5;

function dotsCoeff(bwKg, sex) {
  const bw = Math.max(40, Math.min(sex === "female" ? 150 : 210, bwKg));
  const d = sex === "female"
    ? (-0.0000010706 * bw ** 4 + 0.0005158568 * bw ** 3 - 0.1126655495 * bw ** 2 + 13.6175032 * bw - 57.96288)
    : (-0.000001093 * bw ** 4 + 0.0007391293 * bw ** 3 - 0.1918759221 * bw ** 2 + 24.0900756 * bw - 307.75076);
  return 500 / d;
}
function wilksCoeff(bwKg, sex) {
  const x = Math.max(40, Math.min(sex === "female" ? 150 : 210, bwKg));
  const c = sex === "female"
    ? [594.31747775582, -27.23842536447, 0.82112226871, -0.00930733913, 0.00004731582, -0.00000009054]
    : [-216.0475144, 16.2606339, -0.002388645, -0.00113732, 0.00000701863, -0.00000001291];
  const denom = c[0] + c[1] * x + c[2] * x ** 2 + c[3] * x ** 3 + c[4] * x ** 4 + c[5] * x ** 5;
  return 500 / denom;
}
function dotsTier(d) {
  if (d == null) return null;
  if (d < 200) return "Beginner";
  if (d < 300) return "Novice";
  if (d < 375) return "Intermediate";
  if (d < 450) return "Advanced";
  if (d < 500) return "Elite";
  return "World-class";
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  const t = new Date(y, m - 1, d); t.setHours(0, 0, 0, 0);
  const n = new Date(); n.setHours(0, 0, 0, 0);
  return Math.round((t - n) / 864e5);
}
function fmtMeetDate(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

/* ---------------------------- small utilities ---------------------------- */
const roundTo = (x, step) => Math.round(x / step) * step;
const fmt = (x) => {
  if (x == null || isNaN(x)) return "—";
  const r = Math.round(x * 10) / 10;
  return Math.abs(r - Math.round(r)) < 1e-9 ? String(Math.round(r)) : String(r);
};
const dshort = (ts) => new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
const pad2 = (n) => String(n).padStart(2, "0");
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; };
const dateStrFromTs = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; };
// Today -> now (keeps order of multiple sets); a past date -> local noon of that day.
const tsFromDateStr = (str) => {
  if (!str || str === todayStr()) return Date.now();
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d, 12, 0, 0).getTime();
};
function platesPerSide(total, bar, denoms) {
  let side = (total - bar) / 2;
  if (side < -0.01) return { below: true, items: [], leftover: 0 };
  const items = [];
  for (const p of denoms) {
    const c = Math.floor(side / p + 1e-6);
    if (c > 0) { items.push({ p, c }); side -= c * p; }
  }
  return { below: false, items, leftover: Math.round(side * 100) / 100 };
}
// One-line plate summary for compact rows, e.g. "2×45 + 25 + 5 / side".
function platesShort(total, bar, denoms) {
  const r = platesPerSide(total, bar, denoms);
  if (r.below) return "under bar";
  if (!r.items.length) return "bar only";
  return r.items.map((it) => (it.c > 1 ? it.c + "×" + fmt(it.p) : fmt(it.p))).join(" + ") + " / side";
}

function Stepper({ value, onChange, step = 1, min = -Infinity, max = Infinity, suffix }) {

/* ------------------------------ line chart ------------------------------- */
function LineChart({ data, color = C.text, height = 150, unit = "" }) {
  if (!data || data.length === 0)
    return <div style={{ color: C.faint, fontSize: 13, padding: "28px 4px", textAlign: "center" }}>No data yet.</div>;
  const W = 320, H = height, gutter = 34, padR = 12, padT = 16, padB = 20;
  const xs = data.map((d) => d.ts), ys = data.map((d) => d.value);
  const lo = Math.min(...ys), hi = Math.max(...ys), mid = (lo + hi) / 2;
  // Widen the window so a few lb of change doesn't look like a cliff: show at
  // least ~10% of the working weight, and always leave a little headroom.
  const half = Math.max(((hi - lo) / 2) * 1.2, mid * 0.05, 5);
  const minY = mid - half, maxY = mid + half;
  const minX = Math.min(...xs), maxX = Math.max(...xs), spanX = maxX - minX || 1;
  const px = (t) => gutter + ((t - minX) / spanX) * (W - gutter - padR);
  const py = (v) => padT + (1 - (v - minY) / (maxY - minY)) * (H - padT - padB);
  const pts = data.map((d) => [px(d.ts), py(d.value)]);
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {[maxY, mid, minY].map((v, i) => (
        <g key={i}>
          <line x1={gutter} x2={W - padR} y1={py(v)} y2={py(v)} stroke={C.line} strokeWidth="1" />
          <text x={gutter - 6} y={py(v) + 3} fill={C.faint} fontSize="9" fontFamily={MONO} textAnchor="end">{fmt(Math.round(v))}</text>
        </g>
      ))}
      {data.length > 1 && <path d={path} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke" />}
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3.5 : 2} fill={i === pts.length - 1 ? C.red : color} />)}
      <text x={Math.min(last[0], W - padR - 30)} y={Math.max(last[1] - 7, 10)} fill={C.text} fontSize="11" fontWeight="700" fontFamily={MONO}>
        {fmt(data[data.length - 1].value)}{unit}
      </text>
      <text x={gutter} y={H - 5} fill={C.faint} fontSize="9" fontFamily={MONO}>{dshort(minX)}</text>
      <text x={W - padR} y={H - 5} fill={C.faint} fontSize="9" fontFamily={MONO} textAnchor="end">{dshort(maxX)}</text>
    </svg>
  );
}

/* -------------------------------- state ---------------------------------- */
const KEY = "lift-weight-suggester-v1";
const DEFAULT = {
  exercises: {}, // name -> { name, sets: [{id, ts, weight, reps, rpe, fromRec, tReps, tRpe, rec, note}] }
  bodyweight: [], // [{id, ts, kg}]
  meet: { date: null, name: "", attempts: {} }, // attempts: { liftName: { opener, second, third } in kg }
  settings: { unit: "lb", round: 5, bar: 45, inputMode: "rpe", sex: "male", trainingMode: "rpe", maxMode: "dynamic", topPct: 85, backoff: { sets: 1, reps: 5, rpe: 8, level: "normal", pct: 75 } },
};
// Default strength ratio of a variation to its main lift, guessed from its name.
const VAR_RATIOS = [
  [/front\s*squat/, 0.82], [/pause|paused|tempo|\bpin\b|dead\s*stop|bottom|deficit/, 0.9],
  [/spoto|larsen|close\s*grip|cgbp|2\s*ct|3\s*ct|count/, 0.93],
  [/block|board|rack|pin\s*press|touch\s*and\s*go|tng/, 1.04],
];
function defaultRatio(name) {
  const n = (name || "").toLowerCase();
  for (const [re, r] of VAR_RATIOS) if (re.test(n)) return r;
  return 0.9;
}
const PRESETS = ["Squat", "Bench Press", "Deadlift", "Overhead Press"];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("train");
  const [sel, setSel] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }, [state]);
  useEffect(() => { if (!sel) { const k = Object.keys(state.exercises); if (k.length) setSel(k[0]); } }, [state.exercises, sel]);

  // one-time repairs: (1) older builds switched the unit label without converting
  // stored loads; (2) stamp existing users as onboarded so they skip first-launch.
  useEffect(() => {
    setState((s) => {
      if (!s.settings) return s;
      let st = s;
      if (st.settings.unitSchema !== 2) {
        let exercises = st.exercises;
        if (st.settings.unit === "kg") {
          const f = 1 / LBKG, cv = (w) => (typeof w === "number" ? Math.round(w * f * 10) / 10 : w);
          exercises = {};
          for (const [k, e] of Object.entries(st.exercises))
            exercises[k] = { ...e, sets: e.sets.map((x) => ({ ...x, weight: cv(x.weight), rec: x.rec != null ? cv(x.rec) : x.rec })), tmax: e.tmax != null ? cv(e.tmax) : e.tmax };
        }
        st = { ...st, exercises, settings: { ...st.settings, unitSchema: 2 } };
      }
      if (st.settings.onboarded === undefined && Object.keys(st.exercises).length > 0)
        st = { ...st, settings: { ...st.settings, onboarded: true } };
      return st;
    });
  }, []);

  const { unit, round, bar, inputMode } = state.settings;
  const denoms = unit === "kg" ? [25, 20, 15, 10, 5, 2.5, 1.25] : [45, 35, 25, 10, 5, 2.5];

  const models = useMemo(() => {
    const ex = state.exercises;
    const own = {};
    for (const [k, e] of Object.entries(ex)) own[k] = buildModel(e.sets.filter((s) => !s.backoff));
    // ratio of a variation's strength to its parent: learned from own numbers, else default
    const ratioOf = (name) => {
      const x = ex[name];
      if (!x || !x.parent || !ex[x.parent]) return 1;
      if (typeof x.ratioManual === "number") return x.ratioManual;
      const a = own[name] && own[name].e1rm, b = own[x.parent] && own[x.parent].e1rm;
      if (a && b) return Math.min(1.2, Math.max(0.5, a / b));
      return typeof x.ratio === "number" ? x.ratio : 0.9;
    };
    // pooled main-equivalent estimate across a main lift + all its variations
    const famCache = {};
    const family = (root) => {
      if (famCache[root]) return famCache[root];
      const members = [root, ...Object.keys(ex).filter((k) => ex[k].parent === root)];
      const all = [];
      for (const m of members) {
        const r = m === root ? 1 : ratioOf(m);
        for (const s of ex[m].sets) { if (s.backoff) continue; all.push({ ts: s.ts, obs: e1rmFromSet(s.weight, s.reps, s.rpe) / r, n: repsToFailure(s.reps, s.rpe) }); }
      }
      all.sort((a, b) => a.ts - b.ts);
      let e = null; const points = [];
      for (const x of all) { e = e == null ? x.obs : e + 0.35 * reliability(x.n) * (x.obs - e); points.push({ ts: x.ts, value: e }); }
      const out = { e1rm: e, points, count: all.length };
      famCache[root] = out; return out;
    };
    const view = {};
    for (const k of Object.keys(ex)) {
      const hasParent = ex[k].parent && ex[ex[k].parent];
      const root = hasParent ? ex[k].parent : k;
      const f = family(root);
      const r = root === k ? 1 : ratioOf(k);
      view[k] = {
        e1rm: f.e1rm != null ? f.e1rm * r : null,
        points: f.points.map((p) => ({ ts: p.ts, value: p.value * r })),
        count: f.count,
        own: own[k],
        ratio: r,
        parent: hasParent ? ex[k].parent : null,
      };
    }
    return view;
  }, [state.exercises]);

  const analysis = useMemo(() => analyze(state, models, unit), [state, models, unit]);
  const meetDays = state.meet && state.meet.date ? daysUntil(state.meet.date) : null;
  const meetName = (state.meet && state.meet.name) || "";

  /* mutations */
  const addExercise = (name, parent, ratio) => {
    const n = name.trim();

    if (exists) { setSel(exists); return; }
    const exObj = { name: n, sets: [] };
    if (parent) { exObj.parent = parent; exObj.ratio = typeof ratio === "number" ? ratio : defaultRatio(n); }
    setState((s) => ({ ...s, exercises: { ...s.exercises, [n]: exObj } }));
    setSel(n);
  };
  const updateExercise = (name, patch) => setState((s) => {
    const e = s.exercises[name]; if (!e) return s;
    const next = { ...e, ...patch };
    Object.keys(next).forEach((key) => next[key] === undefined && delete next[key]);
    return { ...s, exercises: { ...s.exercises, [name]: next } };
  });
  const logSet = (name, set) => {
    setState((s) => {
      const ex = s.exercises[name]; if (!ex) return s;
      return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: [...ex.sets, { id: uid(), ts: Date.now(), ...set }] } } };
    });
  };
  const deleteSet = (name, id) => setState((s) => {
    const ex = s.exercises[name]; if (!ex) return s;
    return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: ex.sets.filter((x) => x.id !== id) } } };
  });
  const updateSet = (name, id, patch) => setState((s) => {
    const ex = s.exercises[name]; if (!ex) return s;
    return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: ex.sets.map((x) => (x.id === id ? { ...x, ...patch } : x)) } } };
  });
  const deleteExercise = (name) => {
    setState((s) => { const e = { ...s.exercises }; delete e[name]; return { ...s, exercises: e }; });
    setSel((cur) => (cur === name ? Object.keys(state.exercises).filter((k) => k !== name)[0] || null : cur));
  };
  const setSetting = (k, v) => setState((s) => ({ ...s, settings: { ...s.settings, [k]: v } }));


  const tabs = [
    { id: "train", label: "Train", icon: Activity },
    { id: "insights", label: "Insights", icon: Zap },
    { id: "history", label: "History", icon: TrendingUp },
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SANS }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "0 0 40px" }}>
        {/* header */}
        <div style={{ position: "sticky", top: 0, zIndex: 20, background: C.bg, borderBottom: `1px solid ${C.line}`, padding: "calc(14px + env(safe-area-inset-top, 0px)) 16px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontWeight: 900, fontSize: 19, letterSpacing: "0.02em" }}>
                IRON<span style={{ color: C.red }}>SET</span>
              </div>
              <div style={{ ...label, fontSize: 9.5, marginTop: 1 }}>{state.settings.trainingMode === "percent" ? "Percentage" : "RPE"}-based load calculator</div>
            </div>
            <button onClick={() => setShowSettings(true)} style={{ background: C.surface2, border: `1px solid ${C.line2}`,
              borderRadius: 10, width: 40, height: 40, color: C.muted, cursor: "pointer", display: "grid", placeItems: "center" }}>
              <Settings size={18} />
            </button>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
            {tabs.map((t) => {
              const a = t.id === tab; const I = t.icon;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  flex: 1, padding: "9px 0", borderRadius: 10, border: `1px solid ${a ? C.red : C.line}`,
                  background: a ? C.redSoft : "transparent", color: a ? C.red : C.muted, cursor: "pointer",
                  fontWeight: 800, fontSize: 11.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}>
                  <I size={14} /> {t.label}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ padding: 16 }}>
          {tab === "train" && (
            <TrainTab {...{ state, sel, setSel, models, addExercise, updateExercise, logSet, settings: state.settings, setSetting, denoms, meetDays, meetName }} />
          )}
          {tab === "insights" && (
            <InsightsTab analysis={analysis} unit={unit} state={state} setState={setState} />
          )}
          {tab === "history" && (
            <HistoryTab {...{ state, sel, setSel, models, deleteSet, updateSet, deleteExercise, unit, inputMode }} />
          )}
        </div>
      </div>

      <SettingsSheet {...{ open: showSettings, onClose: () => setShowSettings(false), settings: state.settings, setSetting, state, setState }} />
      {!state.settings.onboarded && <Onboarding onDone={(patch) => setState((s) => ({ ...s, settings: { ...s.settings, ...patch } }))} />}
    </div>
  );
}

function Onboarding({ onDone }) {
  const [step, setStep] = useState("style");
  const opt = (title, desc, onClick) => (
    <button onClick={onClick} style={{ width: "100%", textAlign: "left", background: C.surface, border: `1px solid ${C.line2}`,
      borderRadius: 14, padding: "16px", cursor: "pointer", color: C.text, marginBottom: 12 }}>
      <div style={{ fontWeight: 800, fontSize: 15.5 }}>{title}</div>
      <div style={{ fontSize: 12.5, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{desc}</div>
    </button>
  );
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, background: C.bg, display: "flex", flexDirection: "column",
      justifyContent: "center", padding: "24px 20px calc(24px + env(safe-area-inset-bottom, 0px))", overflowY: "auto" }}>
      <div style={{ maxWidth: 460, margin: "0 auto", width: "100%" }}>
        <div style={{ fontWeight: 900, fontSize: 26, letterSpacing: "0.02em", textAlign: "center" }}>IRON<span style={{ color: C.red }}>SET</span></div>
        {step === "style" ? (
          <>
            <div style={{ textAlign: "center", color: C.muted, fontSize: 13.5, margin: "8px 0 22px", lineHeight: 1.5 }}>How do you train? You can switch anytime in settings.</div>
            {opt("RPE-based", "Prescribe by reps and RPE — the app suggests your load and learns from how each set feels.", () => onDone({ trainingMode: "rpe", inputMode: "rpe", onboarded: true }))}
            {opt("Percentage-based", "Prescribe by reps and a % of your max — old-school 1RM-percentage style.", () => setStep("max"))}
          </>
        ) : (
          <>
            <div style={{ textAlign: "center", color: C.muted, fontSize: 13.5, margin: "8px 0 22px", lineHeight: 1.5 }}>Run your percentages off…</div>
            {opt("Your estimated max", "Auto-updates as you log — your percentages always track your current strength.", () => onDone({ trainingMode: "percent", maxMode: "dynamic", inputMode: "rir", onboarded: true }))}
            {opt("A max you set", "Lock a training max for each lift and bump it yourself each cycle (5/3/1 style).", () => onDone({ trainingMode: "percent", maxMode: "locked", inputMode: "rir", onboarded: true }))}
            <button onClick={() => setStep("style")} style={{ display: "block", margin: "4px auto 0", background: "none", border: "none", color: C.faint, fontSize: 12.5, fontWeight: 700, cursor: "pointer" }}>← Back</button>
          </>
        )}
      </div>
    </div>
  );
}

/* =============================== TRAIN TAB =============================== */
function TrainTab({ state, sel, setSel, models, addExercise, updateExercise, logSet, settings, setSetting, denoms, meetDays, meetName }) {
  const { unit, round, bar, inputMode } = settings;
  const names = Object.keys(state.exercises);
  const mains = names.filter((n) => !state.exercises[n].parent);
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [linking, setLinking] = useState(false);

  // prescription
  const [tReps, setTReps] = useState(3);
  const [tInt, setTInt] = useState(inputMode === "rir" ? 1 : 8); // value in current mode
  const tRpe = inputMode === "rir" ? 10 - tInt : tInt;

  // log panel
  const [log, setLog] = useState({ weight: "", reps: 3, int: inputMode === "rir" ? 1 : 8 });
  const [fromRec, setFromRec] = useState(false);
  const [note, setNote] = useState("");
  const [showPlates, setShowPlates] = useState(false);
  const [showHow, setShowHow] = useState(false);
  const [justLogged, setJustLogged] = useState(false);
  const [logDate, setLogDate] = useState(todayStr());

  const model = (sel && models[sel]) ? models[sel] : { e1rm: null, points: [], count: 0 };
  const e1rm = model.e1rm;
  const selEx = sel ? state.exercises[sel] : null;
  const childNames = sel ? names.filter((n) => state.exercises[n].parent === sel) : [];
  const parentName = selEx && selEx.parent && state.exercises[selEx.parent] ? selEx.parent : null;
  const ratioPct = Math.round((model.ratio || 1) * 100);
  // training mode + reference max that percentages run off
  const percentMode = settings.trainingMode === "percent";
  const locked = percentMode && settings.maxMode === "locked";
  const tmax = selEx ? selEx.tmax : null;
  const setTmax = (val) => { if (sel) updateExercise(sel, { tmax: val }); };
  const [editTmax, setEditTmax] = useState(false);
  const [tmaxInput, setTmaxInput] = useState("");
  const ref = percentMode ? (locked ? (tmax != null ? tmax : (e1rm != null ? roundTo(e1rm, round) : null)) : (e1rm != null ? roundTo(e1rm, round) : null)) : e1rm;
  const topPct = settings.topPct || 85;
  const setTopPct = (v) => setSetting && setSetting("topPct", Math.max(30, Math.min(105, v)));

  const rec = percentMode ? (ref != null ? ref * (topPct / 100) : null) : (e1rm != null ? weightForTarget(e1rm, tReps, tRpe) : null);
  const recR = rec != null ? roundTo(rec, round) : null;
  // predicted effort for a % prescription, measured against the app's true estimate
  const predRpe = (percentMode && e1rm != null && recR != null) ? Math.max(1, Math.min(10, 10 - (repsAtPct((recR / e1rm) * 100) - tReps))) : null;
  const strongDay = (!percentMode && e1rm != null && tRpe < 10) ? roundTo(weightForTarget(e1rm, tReps, Math.min(10, tRpe + 0.5)), round) : null;
  const toughDay = (!percentMode && e1rm != null) ? roundTo(weightForTarget(e1rm, tReps, tRpe - 0.5), round) : null;

  // back-off sets — fatigue-aware in RPE mode; a flat % in percentage mode
  const bo = settings.backoff || { sets: 1, reps: 5, rpe: 8, pct: 75 };
  const setBo = (patch) => setSetting && setSetting("backoff", { ...bo, ...patch });
  const boPct = bo.pct || 75;
  // Each back-off targets bo.reps @ bo.rpe; the load is what hits that target given how
  // much capacity the *actual* prior set spent. The first comes off your top set, each
  // next off the back-off before it, so a grindy set pulls the next one down harder.
  const [boDraft, setBoDraft] = useState(null);
  const personalK = useMemo(() => learnFatigueK(selEx ? selEx.sets : [], DEFAULT_FATIGUE_K), [selEx]);
  const boDayStr = new Date(tsFromDateStr(logDate)).toDateString();
  const todayBos = (selEx ? selEx.sets : []).filter((x) => x.backoff && new Date(x.ts).toDateString() === boDayStr);
  const doneCount = todayBos.length;
  const lastBo = doneCount ? todayBos[doneCount - 1] : null;
  // the set that drives the next back-off: last back-off → today's top set → estimate
  const prevForBo = (() => {
    if (lastBo) return { implied: e1rmFromSet(lastBo.weight, lastBo.reps, lastBo.rpe), reps: lastBo.reps, rpe: lastBo.rpe };
    const topToday = (selEx ? selEx.sets : []).filter((x) => !x.backoff && new Date(x.ts).toDateString() === boDayStr).pop();
    if (topToday) return { implied: e1rmFromSet(topToday.weight, topToday.reps, topToday.rpe), reps: topToday.reps, rpe: topToday.rpe };
    if (e1rm != null) return { implied: e1rm, reps: tReps, rpe: tRpe };
    return null;
  })();
  const boSug = (() => {
    if (percentMode) {
      if (doneCount === 0) return ref != null ? roundTo(ref * (boPct / 100), round) : null;
      return lastBo ? roundTo(lastBo.weight, round) : null;
    }
    if (!prevForBo) return null;
    const effCap = prevForBo.implied * (1 - fatigueDrop(prevForBo.reps, prevForBo.rpe, personalK));
    return roundTo(weightForTarget(effCap, bo.reps, bo.rpe), round);
  })();
  const boIntDefault = (() => {
    if (percentMode) {
      if (e1rm != null && boSug != null) {
        const pr = Math.max(1, Math.min(10, 10 - (repsAtPct((boSug / e1rm) * 100) - bo.reps)));
        return inputMode === "rir" ? Math.max(0, Math.round((10 - pr) * 2) / 2) : Math.round(pr * 2) / 2;
      }
      return inputMode === "rir" ? 1 : 9;
    }
    return inputMode === "rir" ? 10 - bo.rpe : bo.rpe;
  })();
  const curBo = boDraft || { weight: boSug != null ? String(boSug) : "", reps: bo.reps, int: boIntDefault };
  const logCurBackoff = () => {
    if (!sel) return;
    const w = parseFloat(curBo.weight);
    if (!isFinite(w) || w <= 0) return;
    const rpe = inputMode === "rir" ? 10 - curBo.int : curBo.int;
    logSet(sel, { weight: roundTo(w, round), reps: curBo.reps, rpe, ts: tsFromDateStr(logDate),
      backoff: true, fromRec: false, tReps: curBo.reps, tRpe: rpe, rec: boSug != null ? boSug : roundTo(w, round) });
    setBoDraft(null);
  };

  const useRec = () => {
    if (recR == null) return;
    let intVal;
    if (percentMode) {
      const pr = predRpe != null ? predRpe : 8;
      intVal = inputMode === "rir" ? Math.max(0, Math.round((10 - pr) * 2) / 2) : Math.round(pr * 2) / 2;
    } else {
      intVal = inputMode === "rir" ? 10 - tRpe : tRpe;
    }
    setLog({ weight: String(recR), reps: tReps, int: intVal });
    setFromRec(true);
  };
  const nudge = (d) => setLog((l) => ({ ...l, int: inputMode === "rir" ? Math.max(0, l.int - d) : Math.min(10, Math.max(5, l.int + d)) }));

  const doLog = () => {
    const w = parseFloat(log.weight);
    if (!sel || isNaN(w) || w <= 0) return;
    const actualRpe = inputMode === "rir" ? 10 - log.int : log.int;
    logSet(sel, {
      weight: w, reps: log.reps, rpe: actualRpe, ts: tsFromDateStr(logDate),
      fromRec, tReps, tRpe, rec: recR, note: note.trim() || undefined,
    });
    setNote(""); setFromRec(false); setJustLogged(true);
    setTimeout(() => setJustLogged(false), 1400);
  };

  if (names.length === 0)
    return (
      <Card style={{ textAlign: "center", padding: "26px 18px" }}>
        <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 6 }}>Add your first lift</div>
        <div style={{ color: C.muted, fontSize: 13.5, marginBottom: 18, lineHeight: 1.5 }}>
          Pick one to start. Log any set — a known 1RM or a working set — and IRONSET calibrates your strength from it.
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 14 }}>
          {PRESETS.map((p) => <Chip key={p} onClick={() => addExercise(p)}>{p}</Chip>)}
        </div>
        <AddRow {...{ newName, setNewName, addExercise, mains }} />
      </Card>
    );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* exercise selector */}
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {names.map((n) => <Chip key={n} active={n === sel} onClick={() => setSel(n)}>{n}</Chip>)}
        <Chip onClick={() => setAdding((v) => !v)}><Plus size={15} style={{ marginTop: -1 }} /></Chip>
      </div>
      {adding && <Card style={{ padding: 12 }}><AddRow {...{ newName, setNewName, mains, addExercise: (n, p) => { addExercise(n, p); setAdding(false); } }} /></Card>}
      {sel && (
        <button onClick={() => setLinking(true)} style={{ alignSelf: "flex-start", background: "none", border: "none",
          color: C.muted, fontSize: 12, fontWeight: 600, cursor: "pointer", padding: "0", display: "inline-flex", alignItems: "center", gap: 6, marginTop: -4 }}>
          <span style={{ color: C.red, fontSize: 14 }}>↔</span>
          {parentName ? `Feeds ${parentName} · ${ratioPct}%` : childNames.length ? `Includes ${childNames.join(", ")}` : "Link as a variation"}
        </button>
      )}

      {meetDays != null && meetDays >= 0 && (
        <div style={{ background: C.redSoft, border: `1px solid ${C.redLine}`, borderRadius: 12, padding: "9px 12px",
          fontSize: 12.5, color: C.text, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <b style={{ color: C.red }}>{meetName || "Meet"}</b>
          <span style={{ fontFamily: MONO, fontWeight: 700 }}>{meetDays === 0 ? "Meet day" : meetDays + " day" + (meetDays === 1 ? "" : "s") + " out"}</span>
        </div>
      )}

      {/* strength readout */}
      <Card>
        {locked ? (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={label}>Training max{sel ? ` · ${sel}` : ""}</div>
              {!editTmax && <button onClick={() => { setTmaxInput(ref != null ? String(ref) : ""); setEditTmax(true); }}
                style={{ background: "none", border: "none", color: C.red, fontWeight: 800, fontSize: 12.5, cursor: "pointer" }}>Edit</button>}
            </div>
            {editTmax ? (
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
                <div style={{ flex: 1 }}><NumField value={tmaxInput} onChange={setTmaxInput} suffix={unit} /></div>
                <Btn kind="primary" onClick={() => { const v = parseFloat(tmaxInput); if (isFinite(v) && v > 0) setTmax(roundTo(v, round)); setEditTmax(false); }}>Save</Btn>
              </div>
            ) : (
              <>
                <div style={{ fontFamily: MONO, fontSize: 30, fontWeight: 700, lineHeight: 1.1, fontVariantNumeric: "tabular-nums", marginTop: 2 }}>
                  {ref != null ? fmt(ref) : "—"}<span style={{ fontSize: 14, color: C.muted, marginLeft: 4 }}>{unit}</span>
                </div>
                <div style={{ fontSize: 11.5, color: C.faint, marginTop: 2 }}>
                  {e1rm != null ? `app estimate ${fmt(roundTo(e1rm, round))} ${unit}` : "log a set to see your estimate"}{tmax == null ? " · using estimate — set yours" : ""}
                </div>
              </>
            )}
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={label}>Estimated 1RM</div>
              <div style={{ fontFamily: MONO, fontSize: 30, fontWeight: 700, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
                {e1rm != null ? fmt(roundTo(e1rm, round)) : "—"}<span style={{ fontSize: 14, color: C.muted, marginLeft: 4 }}>{unit}</span>
              </div>
            </div>
            <div style={{ textAlign: "right", fontSize: 11.5, color: C.muted, lineHeight: 1.5 }}>
              {model.count > 0
                ? <>from {model.count} set{model.count > 1 ? "s" : ""}<br />updated {dshort(model.points[model.points.length - 1].ts)}</>
                : "not calibrated"}
            </div>
          </div>
        )}
      </Card>

      {/* TOP SET widget — prescribe, see the load, log it, all in one */}
      <Card>
        <div style={label}>Top set</div>
        <div style={{ fontSize: 11, color: C.faint, marginTop: 4 }}>Set your target, see the load, then log what you actually hit.</div>
        <div style={{ display: "flex", gap: 14, marginTop: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
            <Stepper value={tReps} onChange={setTReps} min={1} max={20} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{percentMode ? "% of max" : (inputMode === "rir" ? "RIR" : "RPE")}</div>
            {percentMode
              ? <Stepper value={topPct} onChange={setTopPct} step={2.5} min={30} max={105} suffix="%" />
              : <Stepper value={tInt} onChange={setTInt} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 5 : 10} />}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
          {percentMode
            ? [70, 75, 80, 85, 90].map((v) => <Chip key={v} active={topPct === v} onClick={() => setTopPct(v)}>{v}%</Chip>)
            : (inputMode === "rir" ? [3, 2, 1, 0] : [7, 8, 9, 10]).map((v) => <Chip key={v} active={tInt === v} onClick={() => setTInt(v)}>{inputMode === "rir" ? `${v} RIR` : `RPE ${v}`}</Chip>)}
        </div>
      <div style={{ height: 1, background: C.line, margin: "16px -16px" }} />

      {/* recommendation */}
      <div style={{ textAlign: "center" }}>
        <div style={label}>Recommended load</div>
        {recR != null ? (
          <>
            <div style={{ fontFamily: MONO, fontSize: 60, fontWeight: 700, lineHeight: 1, marginTop: 8, letterSpacing: "-0.02em",
              fontVariantNumeric: "tabular-nums", transition: "color .2s" }}>
              {fmt(recR)}<span style={{ fontSize: 20, color: C.muted, marginLeft: 6, fontWeight: 600 }}>{unit}</span>
            </div>
            {/* barbell motif */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, margin: "12px auto 4px", width: 120 }}>
              <span style={{ width: 7, height: 16, background: C.red, borderRadius: 2 }} />
              <span style={{ flex: 1, height: 3, background: C.redLine }} />
              <span style={{ width: 7, height: 16, background: C.red, borderRadius: 2 }} />
            </div>
            <div style={{ fontSize: 13, color: C.muted, fontWeight: 600 }}>
              {percentMode
                ? `${tReps} rep${tReps > 1 ? "s" : ""} @ ${fmt(topPct)}%`
                : `${tReps} rep${tReps > 1 ? "s" : ""} @ ${inputMode === "rir" ? `${10 - tRpe} RIR` : `RPE ${fmt(tRpe)}`}`}
            </div>
            {percentMode
              ? (predRpe != null && <div style={{ fontSize: 11.5, color: C.faint, marginTop: 8, fontFamily: MONO }}>≈ RPE {fmt(Math.round(predRpe * 2) / 2)} · {fmt(Math.max(0, Math.round((10 - predRpe) * 2) / 2))} RIR</div>)
              : ((strongDay || toughDay) && (
                <div style={{ fontSize: 11.5, color: C.faint, marginTop: 8, fontFamily: MONO }}>
                  {strongDay ? `strong day ${fmt(strongDay)}` : ""}{strongDay && toughDay ? "  ·  " : ""}{toughDay ? `tough day ${fmt(toughDay)}` : ""}
                </div>
              ))}
            {/* plates */}
            <button onClick={() => setShowPlates((v) => !v)} style={{ marginTop: 12, background: "none", border: "none",
              color: C.muted, fontSize: 12, fontWeight: 700, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4 }}>
              Plates per side <ChevronDown size={14} style={{ transform: showPlates ? "rotate(180deg)" : "none", transition: ".2s" }} />
            </button>
            {showPlates && <PlateView total={recR} bar={bar} denoms={denoms} unit={unit} />}
          </>
        ) : (
          <div style={{ color: C.muted, fontSize: 13.5, padding: "18px 8px", lineHeight: 1.5 }}>
            Log a set below to calibrate <b style={{ color: C.text }}>{sel}</b>. Enter a known 1RM (1 rep @ RPE 10) or any working set.
          </div>
        )}
      </div>

      <div style={{ height: 1, background: C.line, margin: "16px -16px" }} />

      {/* log what you did */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={label}>Log your top set</div>
          {recR != null && <button onClick={useRec} style={{ background: C.redSoft, border: `1px solid ${C.redLine}`,
            color: C.red, borderRadius: 9, padding: "6px 11px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Use recommendation</button>}
        </div>

        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>
            Date{logDate !== todayStr() ? <span style={{ color: C.red }}> · backdated</span> : ""}
          </div>
          <DateField value={logDate} onChange={setLogDate} />
        </div>

        {fromRec && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 7, fontWeight: 700 }}>How did it actually feel?</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Chip onClick={() => nudge(-0.5)}>Easier</Chip>
              <Chip onClick={() => {}}>As expected</Chip>
              <Chip onClick={() => nudge(0.5)}>Harder</Chip>
            </div>
          </div>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 14, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 110px" }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Weight</div>
            <NumField value={log.weight} onChange={(v) => setLog((l) => ({ ...l, weight: v }))} suffix={unit} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
            <Stepper value={log.reps} onChange={(v) => setLog((l) => ({ ...l, reps: v }))} min={1} max={30} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
            <Stepper value={log.int} onChange={(v) => setLog((l) => ({ ...l, int: v }))} step={0.5}
              min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 6 : 10} />
          </div>
        </div>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (optional)"
          style={{ width: "100%", marginTop: 12, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10,
            padding: "11px 12px", color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
        <Btn kind="primary" onClick={doLog} style={{ width: "100%", marginTop: 12 }} disabled={!parseFloat(log.weight)}>
          {justLogged ? <><Check size={17} /> Logged</> : "Log set"}
        </Btn>
        <div style={{ fontSize: 11, color: C.faint, marginTop: 8, textAlign: "center" }}>
          Every set you log retunes your 1RM — heavier feedback than expected lowers it, easier raises it.
        </div>
      </Card>

      {/* back-off sets */}
      {recR != null && (
        <Card>
          <div style={label}>Back-off sets</div>
          <div style={{ fontSize: 11, color: C.faint, marginTop: 4 }}>{percentMode ? `A flat ${fmt(boPct)}% of your max — edit any set and the next follows it.` : "Each load adjusts to how hard your last set actually was — a grind drops the next more. Edit any set; it carries forward."}</div>

          <div style={{ display: "flex", gap: 14, marginTop: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Sets</div>
              <Stepper value={bo.sets} onChange={(v) => setBo({ sets: Math.max(1, Math.min(6, v)) })} min={1} max={6} />
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
              <Stepper value={bo.reps} onChange={(v) => setBo({ reps: v })} min={1} max={20} />
            </div>
            <div>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{percentMode ? "% of max" : (inputMode === "rir" ? "RIR" : "RPE")}</div>
              {percentMode
                ? <Stepper value={boPct} onChange={(v) => setBo({ pct: Math.max(30, Math.min(100, v)) })} step={2.5} min={30} max={100} suffix="%" />
                : <Stepper value={inputMode === "rir" ? 10 - bo.rpe : bo.rpe} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 5 : 10}
                    onChange={(v) => setBo({ rpe: inputMode === "rir" ? 10 - v : v })} />}
            </div>
          </div>

          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
            {todayBos.map((s, i) => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
                background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "9px 13px" }}>
                <div style={{ fontSize: 12, color: C.muted, fontWeight: 700 }}>
                  Back-off {i + 1} · <span style={{ fontFamily: MONO, color: C.text }}>{fmt(s.weight)}{unit}</span> × {s.reps} <span style={{ color: C.faint }}>@ {inputMode === "rir" ? `${fmt(10 - s.rpe)} RIR` : `RPE ${fmt(s.rpe)}`}</span>
                </div>
                <Check size={15} style={{ color: C.good }} />
              </div>
            ))}

            {doneCount < bo.sets && (
              <div style={{ background: C.bg2, border: `1px solid ${C.redLine}`, borderRadius: 12, padding: "12px 14px" }}>
                <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, marginBottom: 10 }}>
                  Back-off {doneCount + 1} of {bo.sets}{!percentMode && prevForBo ? ` · off your ${inputMode === "rir" ? `${fmt(10 - prevForBo.rpe)} RIR` : `RPE ${fmt(prevForBo.rpe)}`} set` : ""}
                </div>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                  <div style={{ flex: "1 1 96px" }}>
                    <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Weight</div>
                    <NumField value={curBo.weight} onChange={(v) => setBoDraft({ ...curBo, weight: v })} suffix={unit} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
                    <Stepper value={curBo.reps} onChange={(v) => setBoDraft({ ...curBo, reps: v })} min={1} max={20} />
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
                    <Stepper value={curBo.int} onChange={(v) => setBoDraft({ ...curBo, int: v })} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 5 : 10} />
                  </div>
                </div>
                {boDraft && boSug != null && (
                  <button onClick={() => setBoDraft(null)} style={{ background: "none", border: "none", color: C.faint,
                    fontSize: 11.5, fontWeight: 700, cursor: "pointer", marginTop: 8, padding: 0 }}>
                    ↺ suggested {fmt(boSug)}{unit} × {bo.reps}
                  </button>
                )}
                {(parseFloat(curBo.weight) || boSug) ? <PlateView total={parseFloat(curBo.weight) || boSug} bar={bar} denoms={denoms} unit={unit} /> : null}
                <Btn kind="primary" onClick={logCurBackoff} style={{ width: "100%", marginTop: 10 }}>Log back-off {doneCount + 1}</Btn>
              </div>
            )}

            {doneCount >= bo.sets && (
              <div style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: "8px 0 2px" }}>
                All {bo.sets} back-off{bo.sets > 1 ? "s" : ""} logged.{" "}
                <button onClick={() => setBo({ sets: bo.sets + 1 })} style={{ background: "none", border: "none", color: C.red, fontWeight: 800, fontSize: 12, cursor: "pointer", padding: 0 }}>add another</button>
              </div>
            )}
          </div>
        </Card>
      )}

      <button onClick={() => setShowHow((v) => !v)} style={{ background: "none", border: "none", color: C.faint,
        fontSize: 12, fontWeight: 700, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5, alignSelf: "center" }}>
        <Info size={14} /> How the numbers work
      </button>
      {showHow && (
        <Card style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6 }}>
          Your RPE tells the calculator how close to failure a set was — RPE 8 means 2 reps left (2 RIR). That maps every set to a percent of your
          one-rep max using the standard RPE chart, so a triple at RPE 9 and a heavy single both inform the same estimate. New sets are blended in
          with recent ones weighted more, and low-rep top sets count more than long high-rep sets. Recommendations just run that estimate backward
          for the reps and RPE you prescribe. Back-offs read the fatigue from your last set's actual reps and how close to failure it was — a grindy RPE 9
          set drops the next one further than an easy one — and each set, top or back-off, feeds the one after it. The app also learns how fast you personally
          fade from past sessions. Back-offs stay out of your 1RM estimate so a tired one never drags your numbers down.
        </Card>
      )}

      {linking && sel && (
        <LinkSheet
          name={sel} exercise={state.exercises[sel]} mains={mains} childNames={childNames}
          effectiveRatio={model.ratio || 1}
          onClose={() => setLinking(false)}
          onSave={(patch) => { updateExercise(sel, patch); setLinking(false); }}
        />
      )}
    </div>
  );
}

    <div>

        <input value={newName} onChange={(e) => setNewName(e.target.value)}

        <div style={{ marginTop: 12 }}>

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

function PlateView({ total, bar, denoms, unit }) {
  const r = platesPerSide(total, bar, denoms);
  if (r.below)
    return <div style={{ fontSize: 12, color: C.faint, marginTop: 10 }}>Below bar weight ({fmt(bar)} {unit}).</div>;
  if (r.items.length === 0)
    return <div style={{ fontSize: 12, color: C.faint, marginTop: 10 }}>Empty bar — {fmt(bar)} {unit}.</div>;
  const sizeFor = (p) => 30 + Math.min(26, (p / denoms[0]) * 26);
  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center", flexWrap: "wrap" }}>
        {r.items.flatMap(({ p, c }) =>
          Array.from({ length: c }).map((_, i) => (
            <div key={p + "-" + i} style={{ width: 26, height: sizeFor(p), borderRadius: 4, background: C.surface2,
              border: `1px solid ${C.line2}`, display: "grid", placeItems: "center", fontFamily: MONO, fontSize: 10.5,
              fontWeight: 700, color: C.text }}>{fmt(p)}</div>
          ))
        )}
      </div>
      <div style={{ fontSize: 11, color: C.faint, marginTop: 8, textAlign: "center", fontFamily: MONO }}>
        {r.items.map((x) => `${fmt(x.p)}×${x.c}`).join("  ")} per side{r.leftover > 0 ? `  ·  +${fmt(r.leftover)} ${unit} off` : ""}
      </div>
    </div>
  );
}

function HistoryTab({ state, sel, setSel, models, deleteSet, updateSet, deleteExercise, unit, inputMode }) {
  const names = Object.keys(state.exercises);
  if (names.length === 0)
    return <Card style={{ textAlign: "center", color: C.muted, fontSize: 14, padding: "28px 16px" }}>
      No lifts yet. Add one in the Train tab to start tracking strength over time.
    </Card>;
  const cur = sel && state.exercises[sel] ? sel : names[0];
  const [armName, setArmName] = useState(null);
  const [editing, setEditing] = useState(null);
  const iconBtn = { background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4 };
  const ex = state.exercises[cur];
  const model = models[cur];
  const sets = [...ex.sets].sort((a, b) => b.ts - a.ts);

  const best = model.points.length ? Math.max(...model.points.map((p) => p.value)) : null;
  const cutoff = Date.now() - 30 * 864e5;
  const before = model.points.filter((p) => p.ts <= cutoff).slice(-1)[0]?.value;
  const delta = before != null && model.e1rm != null ? model.e1rm - before : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {names.map((n) => <Chip key={n} active={n === cur} onClick={() => setSel(n)}>{n}</Chip>)}
      </div>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          {[["Current 1RM", model.e1rm], ["Best", best], ["30-day", delta]].map(([l, v], i) => (
            <div key={l} style={{ textAlign: i === 0 ? "left" : "center" }}>
              <div style={{ ...label, fontSize: 9.5 }}>{l}</div>
              <div style={{ fontFamily: MONO, fontSize: 21, fontWeight: 700, marginTop: 3,
                color: l === "30-day" ? (v > 0 ? C.good : v < 0 ? C.red : C.text) : C.text }}>
                {l === "30-day" && v != null && v > 0 ? "+" : ""}{v != null ? fmt(v) : "—"}
              </div>
            </div>
          ))}
        </div>
        <div style={{ ...label, fontSize: 9.5, marginBottom: 4 }}>Strength trend ({unit})</div>
        <LineChart data={model.points} color="#A9B4C2" height={150} unit={unit} />
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "14px 16px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={label}>Set log</span>
          <span style={{ fontSize: 11.5, color: C.faint }}>{sets.length} total</span>
        </div>
        {sets.length === 0 && <div style={{ padding: "8px 16px 18px", color: C.faint, fontSize: 13 }}>No sets logged.</div>}
        {sets.map((s) => (
          <div key={s.id} style={{ padding: "11px 16px", borderTop: `1px solid ${C.line}`, display: "flex",
            alignItems: "center", justifyContent: "space-between", gap: 10 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontFamily: MONO, fontSize: 15, fontWeight: 600 }}>
                {fmt(s.weight)}{unit} × {s.reps} <span style={{ color: C.muted }}>@ {inputMode === "rir" ? `${fmt(10 - s.rpe)} RIR` : `RPE ${fmt(s.rpe)}`}</span>
                {s.backoff && <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 800, color: C.muted,
                  border: `1px solid ${C.line2}`, borderRadius: 6, padding: "1px 6px", marginLeft: 8, letterSpacing: "0.04em", textTransform: "uppercase" }}>Back-off</span>}
              </div>
              <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>
                {dshort(s.ts)}{s.backoff ? "" : ` · e1RM ${fmt(e1rmFromSet(s.weight, s.reps, s.rpe))}${unit}`}
                {s.fromRec && s.tRpe != null && (
                  <span style={{ color: Math.abs(s.rpe - s.tRpe) < 0.25 ? C.good : C.red }}>
                    {"  ·  target " + (inputMode === "rir" ? `${fmt(10 - s.tRpe)} RIR` : `RPE ${fmt(s.tRpe)}`) + (Math.abs(s.rpe - s.tRpe) < 0.25 ? " ✓" : ` → felt ${inputMode === "rir" ? `${fmt(10 - s.rpe)} RIR` : `RPE ${fmt(s.rpe)}`}`)}
                  </span>
                )}
                {s.note ? `  ·  ${s.note}` : ""}

            </div>
            <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>

      {armName === cur ? (
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="danger" onClick={() => { deleteExercise(cur); setArmName(null); }}><Trash2 size={15} /> Confirm delete</Btn>
          <Btn kind="ghost" onClick={() => setArmName(null)}>Cancel</Btn>

      ) : (
        <Btn kind="danger" onClick={() => setArmName(cur)} style={{ alignSelf: "flex-start" }}>
          <Trash2 size={15} /> Delete this lift
        </Btn>

      {editing && (
        <EditSetSheet
          set={editing} unit={unit} inputMode={inputMode}
          onClose={() => setEditing(null)}

/* ===================== STRENGTH SCORE + MEET PREP ====================== */
function ScoreCard({ analysis, unit, state, setState }) {
  const sex = (state.settings && state.settings.sex) || "male";
  const bwArr = state.bodyweight || [];
  const bwKg = bwArr.length ? bwArr[bwArr.length - 1].kg : null;
  const [share, setShare] = useState(null);
  const [editing, setEditing] = useState(bwKg == null);
  const [inp, setInp] = useState(bwKg != null ? fmt(fromKg(bwKg, unit)) : "");
  const totalUnit = analysis.total;
  const totalKg = totalUnit != null ? toKg(totalUnit, unit) : null;
  const dots = bwKg != null && totalKg != null ? dotsCoeff(bwKg, sex) * totalKg : null;
  const wilks = bwKg != null && totalKg != null ? wilksCoeff(bwKg, sex) * totalKg : null;
  const tier = dotsTier(dots);
  const setSex = (v) => setState((s) => ({ ...s, settings: { ...s.settings, sex: v } }));
  const saveBw = () => {
    const v = parseFloat(inp);
    if (!isFinite(v) || v <= 0) return;
    const kg = toKg(v, unit);
    setState((s) => {
      const arr = [...(s.bodyweight || [])];
      const today = dateStrFromTs(Date.now());
      const i = arr.findIndex((e) => dateStrFromTs(e.ts) === today);
      if (i >= 0) arr[i] = { ...arr[i], kg }; else arr.push({ id: Date.now() + Math.random(), ts: Date.now(), kg });
      return { ...s, bodyweight: arr };
    });
    setEditing(false);
  };
  const doShareScore = () => doShare(setShare, { type: "stat", label: "DOTS score", value: fmt(Math.round(dots)), unit: "",
    sub: "Total " + fmt(Math.round(totalKg)) + " kg  @  " + fmt(Math.round(fromKg(bwKg, unit))) + " " + unit,
    date: new Date().toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) });

  if (totalKg == null) return (
    <Card>
      <div style={label}>Strength score</div>
      <div style={{ fontSize: 12.5, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>
        Log squat, bench, and deadlift to see your DOTS and Wilks score.
      </div>
    </Card>
  );

  return (
    <Card style={{ position: "relative" }}>
      {dots != null && <button onClick={doShareScore} aria-label="Share" style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4, position: "absolute", top: 10, right: 10 }}><Share size={16} /></button>}
      <div style={label}>Strength score</div>
      {bwKg != null && !editing ? (
        <div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginTop: 8, flexWrap: "wrap" }}>
            <span style={{ fontFamily: MONO, fontSize: 40, fontWeight: 700, lineHeight: 1 }}>{fmt(Math.round(dots))}</span>
            <span style={{ ...label, fontSize: 10 }}>DOTS</span>
            {tier && <span style={{ fontSize: 11, color: C.muted, fontWeight: 700 }}>≈ {tier}</span>}
          </div>
          <div style={{ display: "flex", gap: 16, marginTop: 8, fontSize: 12.5, color: C.muted }}>
            <span>Wilks <b style={{ color: C.text, fontFamily: MONO }}>{fmt(Math.round(wilks))}</b></span>
            <span>Total <b style={{ color: C.text, fontFamily: MONO }}>{fmt(Math.round(totalKg))}</b> kg</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12, gap: 10 }}>
            <span style={{ fontSize: 12.5, color: C.muted }}>BW {fmt(fromKg(bwKg, unit))} {unit}
              <button onClick={() => { setInp(fmt(fromKg(bwKg, unit))); setEditing(true); }} style={{ background: "none", border: "none", color: C.red, fontWeight: 700, fontSize: 12.5, cursor: "pointer" }}>Edit</button>
            </span>
            <Segmented value={sex} onChange={setSex} options={[{ value: "male", label: "M" }, { value: "female", label: "F" }]} />
          </div>
        </div>
      ) : (
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 8 }}>Enter your bodyweight to see DOTS &amp; Wilks.</div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1 }}><NumField value={inp} onChange={setInp} suffix={unit} /></div>
            <Btn kind="primary" onClick={saveBw}>Save</Btn>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
            <Segmented value={sex} onChange={setSex} options={[{ value: "male", label: "Male" }, { value: "female", label: "Female" }]} />
          </div>
        </div>
      )}
      {share && <ShareSheet data={share} onClose={() => setShare(null)} />}
    </Card>
  );
}
