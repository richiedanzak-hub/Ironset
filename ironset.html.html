/* ----------------------------------------------------------------------------
   STRENGTH ENGINE
   Everything keys off one idea: an RPE-anchored set tells you how far from
   failure you were. RIR = 10 - RPE, so a set of `reps` at a given RPE is
   equivalent to doing `reps + RIR` reps to true failure. That single "reps to
   failure" number maps to a % of 1RM via the standard RPE/RTS chart. From there
   we can both estimate a 1RM from any set, and predict a weight for any target.
---------------------------------------------------------------------------- */

// % of 1RM for N reps taken to true failure (RPE 10). Standard RTS values.
const PCT = {
  1: 100.0, 2: 95.5, 3: 92.2, 4: 89.2, 5: 86.3, 6: 83.7, 7: 81.1, 8: 78.6,
  9: 76.2, 10: 73.9, 11: 70.7, 12: 68.0, 13: 65.3, 14: 62.6, 15: 59.9,
  16: 57.3, 17: 54.8, 18: 52.4, 19: 50.0, 20: 47.6,
};
function pctForN(n) {
  if (n <= 1) return 100;
  if (n >= 20) return PCT[20];
  const lo = Math.floor(n), hi = Math.ceil(n);
  if (lo === hi) return PCT[lo];
  return PCT[lo] + (PCT[hi] - PCT[lo]) * (n - lo); // linear interp for half-RPEs
}
const repsToFailure = (reps, rpe) => reps + Math.max(0, 10 - rpe);
// Observed estimated 1RM from a completed set.
function e1rmFromSet(weight, reps, rpe) {
  return weight / (pctForN(repsToFailure(reps, rpe)) / 100);
}
// Predict the weight for a prescribed (reps, rpe) given an estimated 1RM.
function weightForTarget(e1rm, reps, rpe) {
  return e1rm * (pctForN(repsToFailure(reps, rpe)) / 100);
}
// How much a set should move the estimate. Heavy/low-rep sets near a max are
// reliable 1RM predictors; long high-rep sets are noisier, so they count less.
function reliability(n) {
  return n <= 8 ? 1 : Math.max(0.4, 1 - (n - 8) * 0.06);
}
// Fold the whole (time-ordered) history into a learned 1RM + a trajectory.
function buildModel(sets) {
  const sorted = [...sets].sort((a, b) => a.ts - b.ts);
  let e = null;
  const points = [];
  for (const s of sorted) {
    const obs = e1rmFromSet(s.weight, s.reps, s.rpe);
    const n = repsToFailure(s.reps, s.rpe);
    e = e == null ? obs : e + 0.35 * reliability(n) * (obs - e);
    points.push({ ts: s.ts, value: e, obs });
  }
  return { e1rm: e, points, count: sorted.length };
}

/* ---------------------------- small utilities ---------------------------- */
const roundTo = (x, step) => Math.round(x / step) * step;
const fmt = (x) => {
  if (x == null || isNaN(x)) return "—";
  const r = Math.round(x * 10) / 10;
  return Math.abs(r - Math.round(r)) < 1e-9 ? String(Math.round(r)) : String(r);
};
const dshort = (ts) => new Date(ts).toLocaleDateString(undefined, { month: "short", day: "numeric" });
const pad2 = (n) => String(n).padStart(2, "0");
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; };
const dateStrFromTs = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; };
// Today -> now (keeps order of multiple sets); a past date -> local noon of that day.
const tsFromDateStr = (str) => {
  if (!str || str === todayStr()) return Date.now();
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d, 12, 0, 0).getTime();
};
function platesPerSide(total, bar, denoms) {
  let side = (total - bar) / 2;
  if (side < -0.01) return { below: true, items: [], leftover: 0 };
  const items = [];
  for (const p of denoms) {
    const c = Math.floor(side / p + 1e-6);
    if (c > 0) { items.push({ p, c }); side -= c * p; }
  }
  return { below: false, items, leftover: Math.round(side * 100) / 100 };
}

/* -------------------------------- theme ---------------------------------- */
// Direction: a strength-sport instrument. Cool powder-coated steel, chalk-white
// text, one iron-red accent (the 25kg-plate red). Tabular monospace numerals
// read like a meet scoreboard; heavy tracked caps read athletic.
const C = {
  bg: "#14161A", bg2: "#1A1D23", surface: "#1F232B", surface2: "#262B34",
  line: "#2C313B", line2: "#3A414D",
  text: "#ECEAE3", muted: "#929AA6", faint: "#5C6470",
  red: "#E23B2E", redSoft: "rgba(226,59,46,0.13)", redLine: "rgba(226,59,46,0.4)",
  good: "#7FC68F",
};

const SANS = "system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif";
const label = { textTransform: "uppercase", letterSpacing: "0.13em", fontWeight: 800, fontSize: 11, color: C.muted };

/* ----------------------------- UI primitives ----------------------------- */
function Btn({ children, onClick, kind = "ghost", style, disabled }) {
  const base = { fontFamily: SANS, fontWeight: 700, fontSize: 14, borderRadius: 12, padding: "11px 16px",
    border: "1px solid transparent", cursor: disabled ? "default" : "pointer", opacity: disabled ? 0.4 : 1,
    transition: "background .15s, border-color .15s", minHeight: 44, display: "inline-flex",
    alignItems: "center", justifyContent: "center", gap: 8 };
  const kinds = {
    primary: { background: C.red, color: "#fff" },
    solid: { background: C.surface2, color: C.text, borderColor: C.line2 },
    ghost: { background: "transparent", color: C.text, borderColor: C.line2 },
    danger: { background: "transparent", color: C.red, borderColor: C.redLine },
  };
  return <button onClick={disabled ? undefined : onClick} style={{ ...base, ...kinds[kind], ...style }}>{children}</button>;
}
function Chip({ active, children, onClick }) {
  return (
    <button onClick={onClick} style={{
      fontFamily: SANS, fontWeight: 700, fontSize: 13, borderRadius: 999, padding: "8px 14px", minHeight: 38,
      cursor: "pointer", whiteSpace: "nowrap", transition: "all .15s",
      background: active ? C.red : C.surface2, color: active ? "#fff" : C.text,
      border: `1px solid ${active ? C.red : C.line2}`,
    }}>{children}</button>
  );
}
function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: "inline-flex", background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 12, padding: 3 }}>
      {options.map((o) => {
        const a = o.value === value;
        return (
          <button key={o.value} onClick={() => onChange(o.value)} style={{
            fontFamily: SANS, fontWeight: 800, fontSize: 12, letterSpacing: "0.04em", padding: "8px 14px",
            borderRadius: 9, cursor: "pointer", border: "none", minHeight: 36,
            background: a ? C.surface2 : "transparent", color: a ? C.text : C.muted,
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}
function Stepper({ value, onChange, step = 1, min = -Infinity, max = Infinity, suffix }) {
  const set = (v) => onChange(Math.min(max, Math.max(min, Math.round(v / step) * step)));
  const btn = { width: 40, height: 40, borderRadius: 10, border: `1px solid ${C.line2}`, background: C.surface2,
    color: C.text, fontSize: 20, fontWeight: 700, cursor: "pointer", lineHeight: 1 };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <button style={btn} onClick={() => set(value - step)}>–</button>
      <div style={{ fontFamily: MONO, fontSize: 19, fontWeight: 600, minWidth: 58, textAlign: "center",
        color: C.text, fontVariantNumeric: "tabular-nums" }}>
        {fmt(value)}{suffix ? <span style={{ fontSize: 12, color: C.muted, marginLeft: 3 }}>{suffix}</span> : null}
      </div>
      <button style={btn} onClick={() => set(value + step)}>+</button>
    </div>
  );
}
function NumField({ value, onChange, suffix }) {
  return (
    <div style={{ display: "flex", alignItems: "center", background: C.bg2, border: `1px solid ${C.line2}`,
      borderRadius: 10, padding: "0 12px", height: 44 }}>
      <input value={value} onChange={(e) => onChange(e.target.value)} inputMode="decimal" type="number"
        style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: C.text,
          fontFamily: MONO, fontSize: 17, fontWeight: 600 }} />
      {suffix ? <span style={{ color: C.muted, fontSize: 13, fontWeight: 700, marginLeft: 6 }}>{suffix}</span> : null}
    </div>
  );
}
function DateField({ value, onChange }) {
  return (
    <input type="date" value={value} max={todayStr()} onChange={(e) => onChange(e.target.value || todayStr())}
      style={{ width: "100%", background: C.bg2, border: `1px solid ${C.line2}`, borderRadius: 10, padding: "0 12px",
        height: 44, color: C.text, fontFamily: MONO, fontSize: 15, fontWeight: 600, outline: "none", colorScheme: "dark" }} />
  );
}
function Card({ children, style }) {
  return <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 16, padding: 16, ...style }}>{children}</div>;
}
function Sheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.55)", zIndex: 50,
      display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 480, background: C.bg2,
        borderTop: `1px solid ${C.line2}`, borderRadius: "20px 20px 0 0", padding: 18, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={{ ...label, fontSize: 13 }}>{title}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer" }}><X size={22} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ------------------------------ line chart ------------------------------- */
function LineChart({ data, color = C.text, height = 150, unit = "" }) {
  if (!data || data.length === 0)
    return <div style={{ color: C.faint, fontSize: 13, padding: "28px 4px", textAlign: "center" }}>No data yet.</div>;
  const W = 320, H = height, padL = 8, padR = 8, padT = 16, padB = 20;
  const xs = data.map((d) => d.ts), ys = data.map((d) => d.value);
  let minY = Math.min(...ys), maxY = Math.max(...ys);
  if (maxY - minY < 1e-6) { minY -= 1; maxY += 1; }
  const minX = Math.min(...xs), maxX = Math.max(...xs), spanX = maxX - minX || 1;
  const px = (t) => padL + ((t - minX) / spanX) * (W - padL - padR);
  const py = (v) => padT + (1 - (v - minY) / (maxY - minY)) * (H - padT - padB);
  const pts = data.map((d) => [px(d.ts), py(d.value)]);
  const path = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const last = pts[pts.length - 1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {[minY, (minY + maxY) / 2, maxY].map((v, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={py(v)} y2={py(v)} stroke={C.line} strokeWidth="1" />
          <text x={padL} y={py(v) - 3} fill={C.faint} fontSize="9" fontFamily={MONO}>{fmt(v)}</text>
        </g>
      ))}
      {data.length > 1 && <path d={path} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke" />}
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3.5 : 2} fill={i === pts.length - 1 ? C.red : color} />)}
      <text x={Math.min(last[0], W - padR - 30)} y={Math.max(last[1] - 7, 10)} fill={C.text} fontSize="11" fontWeight="700" fontFamily={MONO}>
        {fmt(data[data.length - 1].value)}{unit}
      </text>
      <text x={padL} y={H - 5} fill={C.faint} fontSize="9" fontFamily={MONO}>{dshort(minX)}</text>
      <text x={W - padR} y={H - 5} fill={C.faint} fontSize="9" fontFamily={MONO} textAnchor="end">{dshort(maxX)}</text>
    </svg>
  );
}

/* -------------------------------- state ---------------------------------- */
const KEY = "lift-weight-suggester-v1";
const DEFAULT = {
  exercises: {}, // name -> { name, sets: [{id, ts, weight, reps, rpe, fromRec, tReps, tRpe, rec, note}] }
  readiness: [], // [{id, ts, level, note}]
  settings: { unit: "lb", round: 5, bar: 45, inputMode: "rpe" },
};
const PRESETS = ["Squat", "Bench Press", "Deadlift", "Overhead Press"];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("train");
  const [sel, setSel] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  // save to this device — works in any browser, offline, no Claude runtime needed
  useEffect(() => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }, [state]);
  // default selection
  useEffect(() => { if (!sel) { const k = Object.keys(state.exercises); if (k.length) setSel(k[0]); } }, [state.exercises, sel]);

  const { unit, round, bar, inputMode } = state.settings;
  const denoms = unit === "kg" ? [25, 20, 15, 10, 5, 2.5, 1.25] : [45, 35, 25, 10, 5, 2.5];

  const models = useMemo(() => {
    const m = {};
    for (const [k, ex] of Object.entries(state.exercises)) m[k] = buildModel(ex.sets);
    return m;
  }, [state.exercises]);

  /* mutations */
  const addExercise = (name) => {
    const n = name.trim();
    if (!n) return;
    const exists = Object.keys(state.exercises).find((k) => k.toLowerCase() === n.toLowerCase());
    if (exists) { setSel(exists); return; }
    setState((s) => ({ ...s, exercises: { ...s.exercises, [n]: { name: n, sets: [] } } }));
    setSel(n);
  };
  const logSet = (name, set) => {
    setState((s) => {
      const ex = s.exercises[name]; if (!ex) return s;
      return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: [...ex.sets, { id: uid(), ts: Date.now(), ...set }] } } };
    });
  };
  const deleteSet = (name, id) => setState((s) => {
    const ex = s.exercises[name]; if (!ex) return s;
    return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: ex.sets.filter((x) => x.id !== id) } } };
  });
  const updateSet = (name, id, patch) => setState((s) => {
    const ex = s.exercises[name]; if (!ex) return s;
    return { ...s, exercises: { ...s.exercises, [name]: { ...ex, sets: ex.sets.map((x) => (x.id === id ? { ...x, ...patch } : x)) } } };
  });
  const deleteExercise = (name) => {
    setState((s) => { const e = { ...s.exercises }; delete e[name]; return { ...s, exercises: e }; });
    setSel((cur) => (cur === name ? Object.keys(state.exercises).filter((k) => k !== name)[0] || null : cur));
  };
  const addReadiness = (level, note) => setState((s) => ({ ...s, readiness: [...s.readiness, { id: uid(), ts: Date.now(), level, note }] }));
  const deleteReadiness = (id) => setState((s) => ({ ...s, readiness: s.readiness.filter((x) => x.id !== id) }));
  const setSetting = (k, v) => setState((s) => ({ ...s, settings: { ...s.settings, [k]: v } }));



  const tabs = [
    { id: "train", label: "Train", icon: Activity },
    { id: "history", label: "History", icon: TrendingUp },
    { id: "readiness", label: "Readiness", icon: Check },
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: SANS }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "0 0 40px" }}>
        {/* header */}
        <div style={{ position: "sticky", top: 0, zIndex: 20, background: C.bg, borderBottom: `1px solid ${C.line}`, padding: "14px 16px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontWeight: 900, fontSize: 19, letterSpacing: "0.02em" }}>
                IRON<span style={{ color: C.red }}>SET</span>
              </div>
              <div style={{ ...label, fontSize: 9.5, marginTop: 1 }}>RPE-based load calculator</div>
            </div>
            <button onClick={() => setShowSettings(true)} style={{ background: C.surface2, border: `1px solid ${C.line2}`,
              borderRadius: 10, width: 40, height: 40, color: C.muted, cursor: "pointer", display: "grid", placeItems: "center" }}>
              <Settings size={18} />
            </button>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 12 }}>
            {tabs.map((t) => {
              const a = t.id === tab; const I = t.icon;
              return (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  flex: 1, padding: "9px 0", borderRadius: 10, border: `1px solid ${a ? C.red : C.line}`,
                  background: a ? C.redSoft : "transparent", color: a ? C.red : C.muted, cursor: "pointer",
                  fontWeight: 800, fontSize: 12.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                  <I size={15} /> {t.label}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ padding: 16 }}>
          {tab === "train" && (
            <TrainTab {...{ state, sel, setSel, models, addExercise, logSet, settings: state.settings, denoms }} />
          )}
          {tab === "history" && (
            <HistoryTab {...{ state, sel, setSel, models, deleteSet, updateSet, deleteExercise, unit, inputMode }} />
          )}
          {tab === "readiness" && (
            <ReadinessTab {...{ readiness: state.readiness, addReadiness, deleteReadiness }} />
          )}
        </div>
      </div>

      <SettingsSheet {...{ open: showSettings, onClose: () => setShowSettings(false), settings: state.settings, setSetting, state, setState }} />
    </div>
  );
}

/* =============================== TRAIN TAB =============================== */
function TrainTab({ state, sel, setSel, models, addExercise, logSet, settings, denoms }) {
  const { unit, round, bar, inputMode } = settings;
  const names = Object.keys(state.exercises);
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");

  // prescription
  const [tReps, setTReps] = useState(3);
  const [tInt, setTInt] = useState(inputMode === "rir" ? 1 : 8); // value in current mode
  const tRpe = inputMode === "rir" ? 10 - tInt : tInt;

  // log panel
  const [log, setLog] = useState({ weight: "", reps: 3, int: inputMode === "rir" ? 1 : 8 });
  const [fromRec, setFromRec] = useState(false);
  const [note, setNote] = useState("");
  const [showPlates, setShowPlates] = useState(false);
  const [showHow, setShowHow] = useState(false);
  const [justLogged, setJustLogged] = useState(false);
  const [logDate, setLogDate] = useState(todayStr());

  const model = (sel && models[sel]) ? models[sel] : { e1rm: null, points: [], count: 0 };
  const e1rm = model.e1rm;
  const rec = e1rm != null ? weightForTarget(e1rm, tReps, tRpe) : null;
  const recR = rec != null ? roundTo(rec, round) : null;
  const strongDay = e1rm != null && tRpe < 10 ? roundTo(weightForTarget(e1rm, tReps, Math.min(10, tRpe + 0.5)), round) : null;
  const toughDay = e1rm != null ? roundTo(weightForTarget(e1rm, tReps, tRpe - 0.5), round) : null;

  const useRec = () => {
    if (recR == null) return;
    setLog({ weight: String(recR), reps: tReps, int: inputMode === "rir" ? 10 - tRpe : tRpe });
    setFromRec(true);
  };
  const nudge = (d) => setLog((l) => ({ ...l, int: inputMode === "rir" ? Math.max(0, l.int - d) : Math.min(10, Math.max(5, l.int + d)) }));

  const doLog = () => {
    const w = parseFloat(log.weight);
    if (!sel || isNaN(w) || w <= 0) return;
    const actualRpe = inputMode === "rir" ? 10 - log.int : log.int;
    logSet(sel, {
      weight: w, reps: log.reps, rpe: actualRpe, ts: tsFromDateStr(logDate),
      fromRec, tReps, tRpe, rec: recR, note: note.trim() || undefined,
    });
    setNote(""); setFromRec(false); setJustLogged(true);
    setTimeout(() => setJustLogged(false), 1400);
  };

  if (names.length === 0)
    return (
      <Card style={{ textAlign: "center", padding: "26px 18px" }}>
        <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 6 }}>Add your first lift</div>
        <div style={{ color: C.muted, fontSize: 13.5, marginBottom: 18, lineHeight: 1.5 }}>
          Pick one to start. Log any set — a known 1RM or a working set — and IRONSET calibrates your strength from it.
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginBottom: 14 }}>
          {PRESETS.map((p) => <Chip key={p} onClick={() => addExercise(p)}>{p}</Chip>)}
        </div>
        <AddRow {...{ newName, setNewName, addExercise }} />
      </Card>
    );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* exercise selector */}
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {names.map((n) => <Chip key={n} active={n === sel} onClick={() => setSel(n)}>{n}</Chip>)}
        <Chip onClick={() => setAdding((v) => !v)}><Plus size={15} style={{ marginTop: -1 }} /></Chip>
      </div>
      {adding && <Card style={{ padding: 12 }}><AddRow {...{ newName, setNewName, addExercise: (n) => { addExercise(n); setAdding(false); } }} /></Card>}

      {/* strength readout */}
      <Card style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={label}>Estimated 1RM</div>
          <div style={{ fontFamily: MONO, fontSize: 30, fontWeight: 700, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
            {e1rm != null ? fmt(roundTo(e1rm, round)) : "—"}<span style={{ fontSize: 14, color: C.muted, marginLeft: 4 }}>{unit}</span>
          </div>
        </div>
        <div style={{ textAlign: "right", fontSize: 11.5, color: C.muted, lineHeight: 1.5 }}>
          {model.count > 0
            ? <>from {model.count} set{model.count > 1 ? "s" : ""}<br />updated {dshort(model.points[model.points.length - 1].ts)}</>
            : "not calibrated"}
        </div>
      </Card>

      {/* prescription */}
      <Card>
        <div style={label}>Prescribed set</div>
        <div style={{ display: "flex", gap: 14, marginTop: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
            <Stepper value={tReps} onChange={setTReps} min={1} max={20} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
            <Stepper value={tInt} onChange={setTInt} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 5 : 10} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
          {(inputMode === "rir" ? [3, 2, 1, 0] : [7, 8, 9, 10]).map((v) => (
            <Chip key={v} active={tInt === v} onClick={() => setTInt(v)}>{inputMode === "rir" ? `${v} RIR` : `RPE ${v}`}</Chip>
          ))}
        </div>
      </Card>

      {/* recommendation — the hero */}
      <Card style={{ background: C.surface, textAlign: "center", paddingTop: 22, paddingBottom: 18 }}>
        <div style={label}>Recommended load</div>
        {recR != null ? (
          <>
            <div style={{ fontFamily: MONO, fontSize: 60, fontWeight: 700, lineHeight: 1, marginTop: 8, letterSpacing: "-0.02em",
              fontVariantNumeric: "tabular-nums", transition: "color .2s" }}>
              {fmt(recR)}<span style={{ fontSize: 20, color: C.muted, marginLeft: 6, fontWeight: 600 }}>{unit}</span>
            </div>
            {/* barbell motif */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, margin: "12px auto 4px", width: 120 }}>
              <span style={{ width: 7, height: 16, background: C.red, borderRadius: 2 }} />
              <span style={{ flex: 1, height: 3, background: C.redLine }} />
              <span style={{ width: 7, height: 16, background: C.red, borderRadius: 2 }} />
            </div>
            <div style={{ fontSize: 13, color: C.muted, fontWeight: 600 }}>
              {tReps} rep{tReps > 1 ? "s" : ""} @ {inputMode === "rir" ? `${10 - tRpe} RIR` : `RPE ${fmt(tRpe)}`}
            </div>
            {(strongDay || toughDay) && (
              <div style={{ fontSize: 11.5, color: C.faint, marginTop: 8, fontFamily: MONO }}>
                {strongDay ? `strong day ${fmt(strongDay)}` : ""}{strongDay && toughDay ? "  ·  " : ""}{toughDay ? `tough day ${fmt(toughDay)}` : ""}
              </div>
            )}
            {/* plates */}
            <button onClick={() => setShowPlates((v) => !v)} style={{ marginTop: 12, background: "none", border: "none",
              color: C.muted, fontSize: 12, fontWeight: 700, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4 }}>
              Plates per side <ChevronDown size={14} style={{ transform: showPlates ? "rotate(180deg)" : "none", transition: ".2s" }} />
            </button>
            {showPlates && <PlateView total={recR} bar={bar} denoms={denoms} unit={unit} />}
          </>
        ) : (
          <div style={{ color: C.muted, fontSize: 13.5, padding: "18px 8px", lineHeight: 1.5 }}>
            Log a set below to calibrate <b style={{ color: C.text }}>{sel}</b>. Enter a known 1RM (1 rep @ RPE 10) or any working set.
          </div>
        )}
      </Card>

      {/* log + feedback */}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={label}>Log the set you did</div>
          {recR != null && <button onClick={useRec} style={{ background: C.redSoft, border: `1px solid ${C.redLine}`,
            color: C.red, borderRadius: 9, padding: "6px 11px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Use recommendation</button>}
        </div>

        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>
            Date{logDate !== todayStr() ? <span style={{ color: C.red }}> · backdated</span> : ""}
          </div>
          <DateField value={logDate} onChange={setLogDate} />
        </div>

        {fromRec && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 7, fontWeight: 700 }}>How did it actually feel?</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Chip onClick={() => nudge(-0.5)}>Easier</Chip>
              <Chip onClick={() => {}}>As expected</Chip>
              <Chip onClick={() => nudge(0.5)}>Harder</Chip>
            </div>
          </div>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 14, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 110px" }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Weight</div>
            <NumField value={log.weight} onChange={(v) => setLog((l) => ({ ...l, weight: v }))} suffix={unit} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>Reps</div>
            <Stepper value={log.reps} onChange={(v) => setLog((l) => ({ ...l, reps: v }))} min={1} max={30} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 }}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
            <Stepper value={log.int} onChange={(v) => setLog((l) => ({ ...l, int: v }))} step={0.5}
              min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 6 : 10} />
          </div>
        </div>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (optional)"
          style={{ width: "100%", marginTop: 12, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10,
            padding: "11px 12px", color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
        <Btn kind="primary" onClick={doLog} style={{ width: "100%", marginTop: 12 }} disabled={!parseFloat(log.weight)}>
          {justLogged ? <><Check size={17} /> Logged</> : "Log set"}
        </Btn>
        <div style={{ fontSize: 11, color: C.faint, marginTop: 8, textAlign: "center" }}>
          Every set you log retunes your 1RM — heavier feedback than expected lowers it, easier raises it.
        </div>
      </Card>

      <button onClick={() => setShowHow((v) => !v)} style={{ background: "none", border: "none", color: C.faint,
        fontSize: 12, fontWeight: 700, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 5, alignSelf: "center" }}>
        <Info size={14} /> How the numbers work
      </button>
      {showHow && (
        <Card style={{ fontSize: 12.5, color: C.muted, lineHeight: 1.6 }}>
          Your RPE tells the calculator how close to failure a set was — RPE 8 means 2 reps left (2 RIR). That maps every set to a percent of your
          one-rep max using the standard RPE chart, so a triple at RPE 9 and a heavy single both inform the same estimate. New sets are blended in
          with recent ones weighted more, and low-rep top sets count more than long high-rep sets. Recommendations just run that estimate backward
          for the reps and RPE you prescribe.
        </Card>
      )}
    </div>
  );
}

function AddRow({ newName, setNewName, addExercise }) {
  return (
    <div style={{ display: "flex", gap: 8 }}>
      <input value={newName} onChange={(e) => setNewName(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") { addExercise(newName); setNewName(""); } }}
        placeholder="e.g. Incline Bench"
        style={{ flex: 1, background: C.bg2, border: `1px solid ${C.line2}`, borderRadius: 10, padding: "11px 12px",
          color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
      <Btn kind="primary" onClick={() => { addExercise(newName); setNewName(""); }}>Add lift</Btn>
    </div>
  );
}

function PlateView({ total, bar, denoms, unit }) {
  const r = platesPerSide(total, bar, denoms);
  if (r.below)
    return <div style={{ fontSize: 12, color: C.faint, marginTop: 10 }}>Below bar weight ({fmt(bar)} {unit}).</div>;
  if (r.items.length === 0)
    return <div style={{ fontSize: 12, color: C.faint, marginTop: 10 }}>Empty bar — {fmt(bar)} {unit}.</div>;
  const sizeFor = (p) => 30 + Math.min(26, (p / denoms[0]) * 26);
  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ display: "flex", gap: 6, justifyContent: "center", alignItems: "center", flexWrap: "wrap" }}>
        {r.items.flatMap(({ p, c }) =>
          Array.from({ length: c }).map((_, i) => (
            <div key={p + "-" + i} style={{ width: 26, height: sizeFor(p), borderRadius: 4, background: C.surface2,
              border: `1px solid ${C.line2}`, display: "grid", placeItems: "center", fontFamily: MONO, fontSize: 10.5,
              fontWeight: 700, color: C.text }}>{fmt(p)}</div>
          ))
        )}
      </div>
      <div style={{ fontSize: 11, color: C.faint, marginTop: 8, textAlign: "center", fontFamily: MONO }}>
        {r.items.map((x) => `${fmt(x.p)}×${x.c}`).join("  ")} per side{r.leftover > 0 ? `  ·  +${fmt(r.leftover)} ${unit} off` : ""}
      </div>
    </div>
  );
}

/* ============================== HISTORY TAB ============================== */
function HistoryTab({ state, sel, setSel, models, deleteSet, updateSet, deleteExercise, unit, inputMode }) {
  const names = Object.keys(state.exercises);
  if (names.length === 0)
    return <Card style={{ textAlign: "center", color: C.muted, fontSize: 14, padding: "28px 16px" }}>
      No lifts yet. Add one in the Train tab to start tracking strength over time.
    </Card>;
  const cur = sel && state.exercises[sel] ? sel : names[0];
  const [armName, setArmName] = useState(null);
  const [editing, setEditing] = useState(null);
  const iconBtn = { background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4 };
  const ex = state.exercises[cur];
  const model = models[cur];
  const sets = [...ex.sets].sort((a, b) => b.ts - a.ts);

  const best = model.points.length ? Math.max(...model.points.map((p) => p.value)) : null;
  const cutoff = Date.now() - 30 * 864e5;
  const before = model.points.filter((p) => p.ts <= cutoff).slice(-1)[0]?.value;
  const delta = before != null && model.e1rm != null ? model.e1rm - before : null;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4 }}>
        {names.map((n) => <Chip key={n} active={n === cur} onClick={() => setSel(n)}>{n}</Chip>)}
      </div>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          {[["Current 1RM", model.e1rm], ["Best", best], ["30-day", delta]].map(([l, v], i) => (
            <div key={l} style={{ textAlign: i === 0 ? "left" : "center" }}>
              <div style={{ ...label, fontSize: 9.5 }}>{l}</div>
              <div style={{ fontFamily: MONO, fontSize: 21, fontWeight: 700, marginTop: 3,
                color: l === "30-day" ? (v > 0 ? C.good : v < 0 ? C.red : C.text) : C.text }}>
                {l === "30-day" && v != null && v > 0 ? "+" : ""}{v != null ? fmt(v) : "—"}
              </div>
            </div>
          ))}
        </div>
        <div style={{ ...label, fontSize: 9.5, marginBottom: 4 }}>Strength trend ({unit})</div>
        <LineChart data={model.points} color="#A9B4C2" height={150} unit={unit} />
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ padding: "14px 16px 6px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={label}>Set log</span>
          <span style={{ fontSize: 11.5, color: C.faint }}>{sets.length} total</span>
        </div>
        {sets.length === 0 && <div style={{ padding: "8px 16px 18px", color: C.faint, fontSize: 13 }}>No sets logged.</div>}
        {sets.map((s) => (
          <div key={s.id} style={{ padding: "11px 16px", borderTop: `1px solid ${C.line}`, display: "flex",
            alignItems: "center", justifyContent: "space-between", gap: 10 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontFamily: MONO, fontSize: 15, fontWeight: 600 }}>
                {fmt(s.weight)}{unit} × {s.reps} <span style={{ color: C.muted }}>@ RPE {fmt(s.rpe)}</span>
              </div>
              <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>
                {dshort(s.ts)} · e1RM {fmt(e1rmFromSet(s.weight, s.reps, s.rpe))}{unit}
                {s.fromRec && s.tRpe != null && (
                  <span style={{ color: Math.abs(s.rpe - s.tRpe) < 0.25 ? C.good : C.red }}>
                    {"  ·  asked RPE " + fmt(s.tRpe) + (Math.abs(s.rpe - s.tRpe) < 0.25 ? " ✓" : ` → felt ${fmt(s.rpe)}`)}
                  </span>
                )}
                {s.note ? `  ·  ${s.note}` : ""}
              </div>
            </div>
            <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
              <button onClick={() => setEditing(s)} style={iconBtn}><Pencil size={15} /></button>
              <button onClick={() => deleteSet(cur, s.id)} style={iconBtn}><Trash2 size={16} /></button>
            </div>
          </div>
        ))}
      </Card>

      {armName === cur ? (
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="danger" onClick={() => { deleteExercise(cur); setArmName(null); }}><Trash2 size={15} /> Confirm delete</Btn>
          <Btn kind="ghost" onClick={() => setArmName(null)}>Cancel</Btn>
        </div>
      ) : (
        <Btn kind="danger" onClick={() => setArmName(cur)} style={{ alignSelf: "flex-start" }}>
          <Trash2 size={15} /> Delete this lift
        </Btn>
      )}

      {editing && (
        <EditSetSheet
          set={editing} unit={unit} inputMode={inputMode}
          onClose={() => setEditing(null)}
          onSave={(patch) => { updateSet(cur, editing.id, patch); setEditing(null); }}
          onDelete={() => { deleteSet(cur, editing.id); setEditing(null); }}
        />
      )}
    </div>
  );
}

/* ============================= READINESS TAB ============================= */
function ReadinessTab({ readiness, addReadiness, deleteReadiness }) {
  const [level, setLevel] = useState(7);
  const [note, setNote] = useState("");
  const [done, setDone] = useState(false);
  const sorted = [...readiness].sort((a, b) => b.ts - a.ts);
  const chartData = [...readiness].sort((a, b) => a.ts - b.ts).map((r) => ({ ts: r.ts, value: r.level }));
  const today = new Date().toDateString();
  const loggedToday = readiness.some((r) => new Date(r.ts).toDateString() === today);

  const save = () => {
    addReadiness(level, note.trim() || undefined);
    setNote(""); setDone(true); setTimeout(() => setDone(false), 1400);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Card>
        <div style={label}>How strong do you feel today?</div>
        <div style={{ textAlign: "center", margin: "14px 0 6px" }}>
          <span style={{ fontFamily: MONO, fontSize: 46, fontWeight: 700, color: C.red }}>{level}</span>
          <span style={{ color: C.muted, fontSize: 18, fontWeight: 600 }}> / 10</span>
        </div>
        <input type="range" min={1} max={10} step={1} value={level} onChange={(e) => setLevel(+e.target.value)}
          style={{ width: "100%", accentColor: C.red }} />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10.5, color: C.faint, marginTop: 2 }}>
          <span>drained</span><span>average</span><span>primed</span>
        </div>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Sleep, soreness, stress… (optional)"
          style={{ width: "100%", marginTop: 14, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10,
            padding: "11px 12px", color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
        <Btn kind="primary" onClick={save} style={{ width: "100%", marginTop: 12 }}>
          {done ? <><Check size={17} /> Saved</> : loggedToday ? "Log again" : "Log readiness"}
        </Btn>
      </Card>

      <Card>
        <div style={{ ...label, marginBottom: 6 }}>Perceived strength over time</div>
        <LineChart data={chartData} color="#A9B4C2" height={150} />
      </Card>

      {sorted.length > 0 && (
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "14px 16px 6px", ...label }}>Check-ins</div>
          {sorted.map((r) => (
            <div key={r.id} style={{ padding: "11px 16px", borderTop: `1px solid ${C.line}`, display: "flex",
              alignItems: "center", justifyContent: "space-between", gap: 10 }}>
              <div>
                <div style={{ fontFamily: MONO, fontSize: 15, fontWeight: 600 }}>{r.level}/10</div>
                <div style={{ fontSize: 11, color: C.faint, marginTop: 2 }}>{dshort(r.ts)}{r.note ? `  ·  ${r.note}` : ""}</div>
              </div>
              <button onClick={() => deleteReadiness(r.id)} style={{ background: "none", border: "none", color: C.faint, cursor: "pointer", padding: 4 }}>
                <Trash2 size={16} />
              </button>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

/* ============================== EDIT SET ================================= */
function EditSetSheet({ set, unit, inputMode, onClose, onSave, onDelete }) {
  const [date, setDate] = useState(dateStrFromTs(set.ts));
  const [weight, setWeight] = useState(String(set.weight));
  const [reps, setReps] = useState(set.reps);
  const [int, setInt] = useState(inputMode === "rir" ? 10 - set.rpe : set.rpe);
  const [note, setNote] = useState(set.note || "");
  const fld = { fontSize: 11, color: C.muted, marginBottom: 6, fontWeight: 700 };
  const save = () => {
    const w = parseFloat(weight);
    if (isNaN(w) || w <= 0) return;
    const rpe = inputMode === "rir" ? 10 - int : int;
    let ts = set.ts; // keep original time-of-day unless the day actually changed
    if (date !== dateStrFromTs(set.ts)) { const [y, m, d] = date.split("-").map(Number); ts = new Date(y, m - 1, d, 12, 0, 0).getTime(); }
    onSave({ ts, weight: w, reps, rpe, note: note.trim() || undefined });
  };
  return (
    <Sheet open onClose={onClose} title="Edit set">
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div>
          <div style={fld}>Date</div>
          <DateField value={date} onChange={setDate} />
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div style={{ flex: "1 1 110px" }}>
            <div style={fld}>Weight</div>
            <NumField value={weight} onChange={setWeight} suffix={unit} />
          </div>
          <div>
            <div style={fld}>Reps</div>
            <Stepper value={reps} onChange={setReps} min={1} max={30} />
          </div>
          <div>
            <div style={fld}>{inputMode === "rir" ? "RIR" : "RPE"}</div>
            <Stepper value={int} onChange={setInt} step={0.5} min={inputMode === "rir" ? 0 : 5} max={inputMode === "rir" ? 6 : 10} />
          </div>
        </div>
        <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Note (optional)"
          style={{ width: "100%", background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "11px 12px",
            color: C.text, fontFamily: SANS, fontSize: 14, outline: "none" }} />
        <div style={{ fontSize: 11.5, color: C.faint }}>
          New estimate from this set: {fmt(e1rmFromSet(parseFloat(weight) || 0, reps, inputMode === "rir" ? 10 - int : int))} {unit} e1RM
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="primary" onClick={save} style={{ flex: 1 }} disabled={!parseFloat(weight)}>Save changes</Btn>
          <Btn kind="danger" onClick={onDelete}><Trash2 size={15} /></Btn>
        </div>
      </div>
    </Sheet>
  );
}

/* ============================== SETTINGS ================================= */
function SettingsSheet({ open, onClose, settings, setSetting, state, setState }) {
  const [backup, setBackup] = useState("");
  const [importText, setImportText] = useState("");
  const [err, setErr] = useState("");
  const [armReset, setArmReset] = useState(false);
  const exportData = () => setBackup(JSON.stringify(state));
  const importData = () => {
    setErr("");
    try {
      const p = JSON.parse(importText);
      setState({ ...DEFAULT, ...p, settings: { ...DEFAULT.settings, ...(p.settings || {}) } });
      onClose();
    } catch (e) { setErr("That doesn't look like valid backup data."); }
  };
  const row = { marginBottom: 18 };
  return (
    <Sheet open={open} onClose={onClose} title="Settings">
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Units</div>
        <Segmented value={settings.unit} onChange={(v) => { setSetting("unit", v); setSetting("bar", v === "kg" ? 20 : 45); setSetting("round", v === "kg" ? 2.5 : 5); }}
          options={[{ value: "lb", label: "LB" }, { value: "kg", label: "KG" }]} />
      </div>
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Prescribe intensity as</div>
        <Segmented value={settings.inputMode} onChange={(v) => setSetting("inputMode", v)}
          options={[{ value: "rpe", label: "RPE" }, { value: "rir", label: "RIR" }]} />
        <div style={{ fontSize: 11.5, color: C.faint, marginTop: 6 }}>RPE 8 and 2 RIR mean the same thing — pick the scale you think in.</div>
      </div>
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Round loads to nearest</div>
        <Segmented value={settings.round} onChange={(v) => setSetting("round", v)}
          options={[{ value: 1, label: "1" }, { value: 2.5, label: "2.5" }, { value: 5, label: "5" }]} />
      </div>
      <div style={row}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Bar weight (for plate math)</div>
        <NumField value={settings.bar} onChange={(v) => setSetting("bar", parseFloat(v) || 0)} suffix={settings.unit} />
      </div>

      <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 4 }}>
        <div style={{ ...label, fontSize: 10, marginBottom: 8 }}>Backup</div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn kind="solid" onClick={exportData} style={{ flex: 1 }}>Show backup</Btn>
          <Btn kind="solid" onClick={importData} style={{ flex: 1 }} disabled={!importText.trim()}>Restore</Btn>
        </div>
        {backup && <textarea readOnly value={backup} onFocus={(e) => e.target.select()} rows={3}
          style={{ width: "100%", marginTop: 8, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8,
            color: C.muted, fontSize: 11, fontFamily: MONO, padding: 8, resize: "vertical" }} />}
        <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="Paste backup data here to restore" rows={2}
          style={{ width: "100%", marginTop: 8, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 8,
            color: C.text, fontSize: 11, fontFamily: MONO, padding: 8, resize: "vertical", outline: "none" }} />
        {err && <div style={{ color: C.red, fontSize: 12, marginTop: 6 }}>{err}</div>}
      </div>

      <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 16 }}>
        {armReset ? (
          <div style={{ display: "flex", gap: 8 }}>
            <Btn kind="danger" onClick={() => { setState(DEFAULT); setArmReset(false); onClose(); }} style={{ flex: 1 }}>Yes, erase everything</Btn>
            <Btn kind="ghost" onClick={() => setArmReset(false)} style={{ flex: 1 }}>Cancel</Btn>
          </div>
        ) : (
          <Btn kind="danger" onClick={() => setArmReset(true)} style={{ width: "100%" }}>Reset all data</Btn>
        )}
      </div>
    </Sheet>
  );
}


class Boundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(e, info) { console.error(e, info); }
  render() {
    if (this.state.err) return (
      <div style={{ padding: 20, minHeight: "100vh", background: "#14161A", color: "#ECEAE3", fontFamily: "system-ui, sans-serif" }}>
        <div style={{ fontWeight: 800, marginBottom: 8 }}>IRONSET hit an error</div>
        <div style={{ fontSize: 12, color: "#9098A4", marginBottom: 10 }}>Reload the page. Your saved data on this device is untouched.</div>
        <pre style={{ whiteSpace: "pre-wrap", fontSize: 11, color: "#E23B2E" }}>{String((this.state.err && this.state.err.message) || this.state.err)}</pre>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App /></Boundary>);

</script>
</body>
